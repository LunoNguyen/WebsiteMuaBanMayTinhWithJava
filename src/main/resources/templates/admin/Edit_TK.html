<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{shared/_LayoutAdmin :: layout(~{::div.container-fluid})}"
>
  <body>
    <div class="container-fluid px-4">
      <h1 class="mt-4">Chỉnh sửa Tài khoản</h1>
      <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item">
          <a th:href="@{/admin/trang-admin}">Tổng quan</a>
        </li>
        <li class="breadcrumb-item">
          <a th:href="@{/admin/ql-taikhoan}">Quản lý Tài khoản</a>
        </li>
        <li class="breadcrumb-item active">Chỉnh sửa</li>
      </ol>

      <div class="card mb-4 shadow-sm" style="max-width: 800px; margin: auto">
        <div class="card-header bg-warning text-dark fw-bold">
          <i class="fas fa-user-shield me-1"></i> Cập nhật thông tin phân quyền
        </div>
        <div class="card-body">
          <form
            th:action="@{/admin/sua-tk}"
            method="post"
            th:object="${taiKhoan}"
          >
            <div class="row mb-3">
              <label class="col-sm-3 col-form-label fw-bold"
                >Mã Tài Khoản</label
              >
              <div class="col-sm-9">
                <input
                  type="text"
                  th:field="*{maTK}"
                  class="form-control bg-light"
                  readonly
                />
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-sm-3 col-form-label fw-bold"
                >Email đăng nhập <span class="text-danger">*</span></label
              >
              <div class="col-sm-9">
                <input
                  type="email"
                  th:field="*{emailTK}"
                  class="form-control"
                  required
                />
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-sm-3 col-form-label fw-bold text-danger"
                >Mật khẩu mới</label
              >
              <div class="col-sm-9">
                <input
                  type="password"
                  th:field="*{matKhau}"
                  class="form-control"
                  placeholder="Bỏ trống nếu không muốn đổi mật khẩu"
                />
                <small class="text-muted fst-italic"
                  >Mật khẩu sẽ tự động được mã hóa MD5 bảo mật.</small
                >
              </div>
            </div>

            <hr class="my-4" />

            <div class="row mb-3">
              <label class="col-sm-3 col-form-label fw-bold"
                >Loại Tài Khoản <span class="text-danger">*</span></label
              >
              <div class="col-sm-9">
                <select th:field="*{loaiTaiKhoan}" class="form-select" required>
                  <option value="KhachHang">Khách Hàng</option>
                  <option value="NhanVien">Nhân Viên</option>
                  <option value="Admin">Quản Trị Viên (Admin)</option>
                </select>
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-sm-3 col-form-label fw-bold"
                >Thuộc Nhân Viên</label
              >
              <div class="col-sm-9">
                <select th:field="*{maNV}" class="form-select">
                  <option value="">-- Không gắn với nhân viên nào --</option>
                  <option
                    th:each="nv : ${dsNhanVien}"
                    th:value="${nv.maNV}"
                    th:text="${nv.maNV + ' - ' + nv.tenNV}"
                  ></option>
                </select>
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-sm-3 col-form-label fw-bold"
                >Thuộc Khách Hàng</label
              >
              <div class="col-sm-9">
                <select th:field="*{maKH}" class="form-select">
                  <option value="">-- Không gắn với khách hàng nào --</option>
                  <option
                    th:each="kh : ${dsKhachHang}"
                    th:value="${kh.maKH}"
                    th:text="${kh.maKH + ' - ' + kh.tenKH}"
                  ></option>
                </select>
              </div>
            </div>

            <div class="row mt-4">
              <div class="col-sm-9 offset-sm-3">
                <button
                  type="submit"
                  class="btn btn-warning fw-bold text-dark me-2"
                >
                  <i class="fas fa-save me-1"></i> Lưu Cập Nhật
                </button>
                <a th:href="@{/admin/ql-taikhoan}" class="btn btn-secondary"
                  >Quay lại</a
                >
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
