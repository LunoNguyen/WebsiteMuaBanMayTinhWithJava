<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{shared/_LayoutTrangChu :: layout(~{::div.container-fluid})}"
>
  <body>
    <div class="container-fluid px-4">
      <div class="d-flex justify-content-between align-items-center mt-4 mb-4">
        <h1>Quản Lý Đơn Hàng</h1>
        <div>
          <a th:href="@{/trang-chu}" class="btn btn-secondary me-2"
            >Quay lại</a
          >
          <button onclick="InHoaDonChuyenNghiep()" class="btn btn-primary">
            <i class="fas fa-print"></i> XÁC NHẬN IN HÓA ĐƠN
          </button>
        </div>
      </div>

      <div class="card mb-4 shadow-sm">
        <div class="card-header bg-dark text-white">
          <i class="fas fa-info-circle me-1"></i> Chi tiết đơn hàng:
          <span th:text="'#' + ${donHang.maHD}"></span>
        </div>
        <div class="card-body">
          <div class="row mb-3">
            <div class="col-md-6">
              <p>
                <strong>Khách hàng:</strong>
                <span th:text="${donHang.khachHang.tenKH}"></span>
              </p>
              <p>
                <strong>Điện thoại:</strong>
                <span th:text="${donHang.khachHang.sdtKH}"></span>
              </p>
            </div>
            <div class="col-md-6 text-md-end">
              <p>
                <strong>Ngày lập:</strong>
                <span
                  th:text="${#temporals.format(donHang.ngayLap, 'dd/MM/yyyy HH:mm')}"
                ></span>
              </p>
              <p>
                <strong>Địa chỉ:</strong>
                <span th:text="${donHang.khachHang.diaChiKH}"></span>
              </p>
            </div>
          </div>
          <table class="table table-bordered">
            <thead class="table-light text-center">
              <tr>
                <th>STT</th>
                <th>Tên sản phẩm</th>
                <th>ĐVT</th>
                <th>SL</th>
                <th>Đơn giá</th>
                <th>Thành tiền</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="item, stat : ${donHang.chiTietHoaDons}">
                <td class="text-center" th:text="${stat.count}"></td>
                <td th:text="${item.sanPham.tenSP}"></td>
                <td class="text-center" th:text="${item.sanPham.donVT}"></td>
                <td class="text-center" th:text="${item.soLuongSP_HD}"></td>
                <td
                  class="text-end"
                  th:text="${item.donGiaHD != null ? #numbers.formatDecimal(item.donGiaHD, 0, 'COMMA', 0, 'POINT') + ' đ' : ''}"
                ></td>
                <td
                  class="text-end fw-bold"
                  th:text="${#numbers.formatDecimal(item.thanhTien, 0, 'COMMA', 0, 'POINT')} + ' đ'"
                ></td>
              </tr>
            </tbody>
            <tfoot>
              <tr class="fw-bold">
                <td colspan="5" class="text-end">TỔNG TIỀN HÀNG:</td>
                <td
                  class="text-end"
                  th:text="${#numbers.formatDecimal(TongTienHang, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"
                ></td>
              </tr>
              <tr class="fw-bold" th:if="${TienGiam != null and TienGiam > 0}">
                <td colspan="5" class="text-end">
                  KHUYẾN MÃI
                  <span th:if="${KhuyenMaiDonHang != null}">
                    (<span th:text="${KhuyenMaiDonHang.maKM}"></span>
                    <span th:if="${KhuyenMaiDonHang.tenKM != null}" th:text="' - ' + ${KhuyenMaiDonHang.tenKM}"></span>)
                  </span>:
                </td>
                <td
                  class="text-end text-success"
                  th:text="'- ' + ${#numbers.formatDecimal(TienGiam, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"
                ></td>
              </tr>
              <tr class="fw-bold">
                <td colspan="5" class="text-end">TỔNG THANH TOÁN:</td>
                <td
                  class="text-end text-danger"
                  th:text="${#numbers.formatDecimal(donHang.tongTienHD, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"
                ></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>

    <script th:inline="javascript">
      function InHoaDonChuyenNghiep() {
        // Thu thập các biến từ Thymeleaf
        var maHD = /*[[${donHang.maHD}]]*/ "N/A";
        var tenKH = /*[[${donHang.khachHang.tenKH}]]*/ "";
        var sdtKH = /*[[${donHang.khachHang.sdtKH}]]*/ "";
        var diaChiKH = /*[[${donHang.khachHang.diaChiKH}]]*/ "";
        var ngayLap =
          /*[[${#temporals.format(donHang.ngayLap, 'dd/MM/yyyy HH:mm')}]]*/ "";
        var tongTien =
          /*[[${#numbers.formatDecimal(donHang.tongTienHD, 0, 'COMMA', 0, 'POINT')}]]*/ "0";
        var tongTienHang =
          /*[[${#numbers.formatDecimal(TongTienHang, 0, 'COMMA', 0, 'POINT')}]]*/ "0";
        var tienGiam =
          /*[[${#numbers.formatDecimal(TienGiam, 0, 'COMMA', 0, 'POINT')}]]*/ "0";
        var maKhuyenMai = /*[[${KhuyenMaiDonHang != null ? KhuyenMaiDonHang.maKM : ''}]]*/ "";
        var logoPath = "/Content/HinhAnhPhongVu/logo_bieumau.jpg"; // Đường dẫn tĩnh theo Spring Boot

        // Trích xuất HTML của bảng chi tiết (clone nội dung phần tbody hiện tại)
        var tbodyContent = document.querySelector("table tbody").innerHTML;

        var noiDungIn = `
            <html>
            <head><title>Hóa đơn ${maHD}</title></head>
            <body style="font-family: 'Times New Roman', serif; padding: 10mm; background: white;">
                <div style="display: flex; border: 1px solid #000; margin-bottom: 20px;">
                    <div style="width: 25%; border-right: 1px solid #000; padding: 15px; text-align: center; display: flex; align-items: center; justify-content: center;">
                        <img src="${logoPath}" style="width: 160px; height: auto;" />
                    </div>
                    <div style="width: 75%; padding: 10px; font-size: 13px; line-height: 1.6;">
                        <strong style="font-size: 15px;">CÔNG TY CỔ PHẦN THƯƠNG MẠI - DỊCH VỤ PHONG VŨ</strong><br>
                        <div style="text-align: center; margin: 5px 0; font-weight: bold;">Mã số thuế: 0304953338</div>
                        <strong>Địa chỉ trụ sở chính:</strong> Tầng 5, Số 117-119-121 Nguyễn Du, P. Bến Thành, Quận 1, TP. HCM<br>
                        <strong>Hotline:</strong> 1800 6867
                    </div>
                </div>

                <h2 style="text-align: center; text-transform: uppercase; font-size: 24px; margin: 20px 0;">Hóa Đơn Bán Hàng</h2>

                <div style="display: flex; justify-content: space-between; font-size: 15px; margin-bottom: 15px;">
                    <div style="line-height: 1.8;">
                        <div>Khách hàng: <strong>${tenKH}</strong></div>
                        <div>Địa chỉ: ${diaChiKH}</div>
                        <div>Điện thoại: ${sdtKH}</div>
                    </div>
                    <div style="text-align: right; line-height: 1.8;">
                        <div>Mã đơn hàng: <strong>#${maHD}</strong></div>
                        <div>Ngày lập: ${ngayLap}</div>
                    </div>
                </div>

                <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                    <thead>
                        <tr style="background: #f2f2f2; font-size: 14px;">
                            <th style="border: 1px solid #000; padding: 10px;">STT</th>
                            <th style="border: 1px solid #000; padding: 10px;">Tên hàng hóa, dịch vụ</th>
                            <th style="border: 1px solid #000; padding: 10px;">DVT</th>
                            <th style="border: 1px solid #000; padding: 10px;">SL</th>
                            <th style="border: 1px solid #000; padding: 10px;">Đơn giá</th>
                            <th style="border: 1px solid #000; padding: 10px;">Thành tiền</th>
                        </tr>
                    </thead>
                    <tbody style="font-size: 14px;">
                        ${tbodyContent}
                    </tbody>
                    <tfoot>
                        <tr style="font-weight: bold; font-size: 15px;">
                            <td colspan="5" style="border: 1px solid #000; text-align: right; padding: 10px;">TỔNG TIỀN HÀNG (VNĐ):</td>
                            <td style="border: 1px solid #000; text-align: right; padding: 10px;">${tongTienHang}</td>
                        </tr>
                        ${
                          maKhuyenMai
                            ? `<tr style="font-weight: bold; font-size: 15px;">
                                <td colspan="5" style="border: 1px solid #000; text-align: right; padding: 10px;">KHUYẾN MÃI (${maKhuyenMai}):</td>
                                <td style="border: 1px solid #000; text-align: right; padding: 10px; color: #198754;">- ${tienGiam}</td>
                              </tr>`
                            : ""
                        }
                        <tr style="font-weight: bold; font-size: 15px;">
                            <td colspan="5" style="border: 1px solid #000; text-align: right; padding: 10px;">TỔNG CỘNG THANH TOÁN (VNĐ):</td>
                            <td style="border: 1px solid #000; text-align: right; padding: 10px; font-size: 17px;">${tongTien}</td>
                        </tr>
                    </tfoot>
                </table>

                <div style="margin-top: 70px; font-size: 12px; font-style: italic; text-align: center; color: #333;">
                    (Cần kiểm tra đối chiếu khi lập, giao, nhận hàng hóa. Hóa đơn có giá trị thay thế phiếu bảo hành)
                </div>

                <script>
                    window.onload = function() {
                        setTimeout(function() { window.print(); window.close(); }, 500);
                    };
                <\/script>
            </body>
            </html>
        `;

        var cuaSoIn = window.open("", "_blank", "width=950,height=900");
        cuaSoIn.document.write(noiDungIn);
        cuaSoIn.document.close();
      }
    </script>
  </body>
</html>
