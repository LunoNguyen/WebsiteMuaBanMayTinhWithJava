<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{shared/_LayoutAdmin :: layout(~{::div.container-fluid})}"
>
  <body>
    <div class="container-fluid px-4">
      <h1 class="mt-4">Thêm Nhân Viên Mới</h1>
      <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item">
          <a th:href="@{/admin/trang-admin}">Tổng quan</a>
        </li>
        <li class="breadcrumb-item">
          <a th:href="@{/admin/ql-nhanvien}">Quản lý Nhân Viên</a>
        </li>
        <li class="breadcrumb-item active">Thêm mới</li>
      </ol>
      <div class="card mb-4 shadow-sm">
        <div class="card-header">
          <span class="fs-5">Nhập thông tin nhân viên</span>
        </div>
        <div class="card-body">
          <form th:action="@{/admin/create-nv}" method="post">
            <div class="row mb-3">
              <label class="col-sm-2 col-form-label fw-bold">Chức Vụ</label>
              <div class="col-sm-10">
                <select name="MACV" class="form-select">
                  <option value="">--- Chọn chức vụ ---</option>
                  <option
                    th:each="cv : ${dsChucVu}"
                    th:value="${cv.maCV}"
                    th:text="${cv.tenCV}"
                  ></option>
                </select>
              </div>
            </div>
            <div class="row mb-3">
              <label class="col-sm-2 col-form-label fw-bold">Họ và Tên</label>
              <div class="col-sm-10">
                <input
                  type="text"
                  name="TENNV"
                  class="form-control"
                  placeholder="Nhập tên nhân viên..."
                  required
                />
              </div>
            </div>
            <div class="row mb-3">
              <label class="col-sm-2 col-form-label fw-bold">Email</label>
              <div class="col-sm-10">
                <input
                  type="email"
                  name="EMAIL_NV"
                  class="form-control"
                  placeholder="example@phongvu.com"
                />
              </div>
            </div>
            <div class="row mb-3">
              <label class="col-sm-2 col-form-label fw-bold"
                >Số Điện Thoại</label
              >
              <div class="col-sm-10">
                <input type="text" name="SDT_NV" class="form-control" />
              </div>
            </div>
            <div class="row mb-3">
              <label class="col-sm-2 col-form-label fw-bold">Địa Chỉ</label>
              <div class="col-sm-10">
                <textarea
                  name="DIACHI_NV"
                  class="form-control"
                  rows="3"
                ></textarea>
              </div>
            </div>
            <div class="row mt-4">
              <div class="col-sm-10 offset-sm-2">
                <button type="submit" class="btn btn-primary me-2">
                  Thêm Nhân Viên
                </button>
                <a th:href="@{/admin/ql-nhanvien}" class="btn btn-secondary"
                  >Quay lại</a
                >
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
