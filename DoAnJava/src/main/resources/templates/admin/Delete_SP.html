<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{shared/_LayoutAdmin :: layout(~{::div.container-fluid})}"
>
  <body>
    <div class="container my-5">
      <h2 class="text-center text-danger mb-4">XÁC NHẬN XÓA SẢN PHẨM</h2>

      <div class="alert alert-warning text-center" role="alert">
        <h3>Bạn có chắc chắn muốn xóa sản phẩm này không?</h3>
        <p>Thao tác này không thể hoàn tác.</p>
      </div>

      <div class="card shadow-sm border-danger">
        <div class="card-body p-4">
          <div class="row">
            <div class="col-md-8 offset-md-2">
              <h4 class="text-primary mb-3">
                Sản phẩm:
                <span class="text-dark" th:text="${sanPham.tenSP}"></span>
              </h4>
              <hr />
              <dl class="row dl-custom-delete">
                <dt class="col-sm-5">Mã sản phẩm:</dt>
                <dd class="col-sm-7" th:text="${sanPham.maSP}"></dd>

                <dt class="col-sm-5">Số lượng tồn:</dt>
                <dd class="col-sm-7" th:text="${sanPham.soLuongTon}"></dd>

                <dt class="col-sm-5">Đơn giá bán:</dt>
                <dd class="col-sm-7">
                  <strong
                    class="text-danger"
                    th:text="${#numbers.formatDecimal(sanPham.donGiaSP, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"
                  ></strong>
                </dd>

                <dt class="col-sm-5">Loại sản phẩm:</dt>
                <dd
                  class="col-sm-7"
                  th:text="${sanPham.loaiSanPham?.tenLoai}"
                ></dd>
              </dl>
            </div>
          </div>
        </div>
      </div>

      <form th:action="@{/admin/delete-sp}" method="post">
        <input type="hidden" name="MASP" th:value="${sanPham.maSP}" />
        <div class="form-actions mt-4 text-center">
          <button type="submit" class="btn btn-danger btn-lg mr-3">
            <i class="fas fa-trash-alt"></i> Xác nhận Xóa
          </button>
          <a th:href="@{/admin/ql-sanpham}" class="btn btn-secondary btn-lg"
            ><i class="fas fa-arrow-left"></i> Hủy và Quay lại</a
          >
        </div>
      </form>
    </div>
  </body>
</html>
