<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{shared/_LayoutAdmin :: layout(~{::div.container-fluid})}"
>
  <body>
    <div class="container-fluid px-4">
      <h1 class="mt-4">Chỉnh sửa Nhân Viên</h1>
      <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item">
          <a th:href="@{/admin/trang-admin}">Tổng quan</a>
        </li>
        <li class="breadcrumb-item">
          <a th:href="@{/admin/ql-nhanvien}">Quản lý Nhân Viên</a>
        </li>
        <li class="breadcrumb-item active">Chỉnh sửa</li>
      </ol>
      <div class="card mb-4">
        <div class="card-body">
          <form th:action="@{/admin/edit-nv}" method="post">
            <input type="hidden" name="MANV" th:value="${nhanVien.maNV}" />

            <div class="mb-3">
              <label class="control-label">Tên Chức Vụ</label>
              <select name="MACV" class="form-select">
                <option value="">Chọn chức vụ</option>
                <option
                  th:each="cv : ${dsChucVu}"
                  th:value="${cv.maCV}"
                  th:text="${cv.tenCV}"
                  th:selected="${cv.maCV == nhanVien.maCV}"
                ></option>
              </select>
            </div>
            <div class="mb-3">
              <label class="control-label">Tên Nhân Viên</label>
              <input
                type="text"
                name="TENNV"
                class="form-control"
                th:value="${nhanVien.tenNV}"
              />
            </div>
            <div class="mb-3">
              <label class="control-label">Email</label>
              <input
                type="email"
                name="EMAIL_NV"
                class="form-control"
                th:value="${nhanVien.emailNV}"
              />
            </div>
            <div class="mb-3">
              <label class="control-label">Số Điện Thoại</label>
              <input
                type="text"
                name="SDT_NV"
                class="form-control"
                th:value="${nhanVien.sdtNV}"
              />
            </div>
            <div class="mb-3">
              <label class="control-label">Địa Chỉ</label>
              <input
                type="text"
                name="DIACHI_NV"
                class="form-control"
                th:value="${nhanVien.diaChiNV}"
              />
            </div>
            <div class="mt-4">
              <button type="submit" class="btn btn-success me-2">
                <i class="fas fa-save me-1"></i> Lưu Cập nhật
              </button>
              <a th:href="@{/admin/ql-nhanvien}" class="btn btn-secondary"
                ><i class="fas fa-arrow-left me-1"></i> Quay lại</a
              >
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
