<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{shared/_LayoutAdmin :: layout(~{::div.container-fluid})}">

<body>
  <div class="container-fluid my-5">
    <h2 class="text-center text-danger mb-4">XÁC NHẬN XÓA SẢN PHẨM</h2>

    <div class="alert alert-warning text-center" role="alert">
      <h3>Bạn có chắc chắn muốn xóa sản phẩm này không?</h3>
      <p>Thao tác này không thể hoàn tác.</p>
    </div>

    <div class="card shadow-sm border-danger">
      <div class="card-body p-4">
        <div class="row align-items-center">
          <div class="col-md-4 text-center mb-3 mb-md-0">
            <div class="col-md-4 text-center mb-3 mb-md-0">
              <div style="
      width: 100%;
      height: 260px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background-color: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    ">
                <img th:if="${sanPham.danhSachAnhs != null and !sanPham.danhSachAnhs.isEmpty()}"
                  th:src="@{/Content/HinhAnhPhongVu/{file}(file=${sanPham.danhSachAnhs[0].tenAnh})}"
                  style="width: 100%; height: 100%; object-fit: contain" alt="Ảnh sản phẩm" />

                <img th:unless="${sanPham.danhSachAnhs != null and !sanPham.danhSachAnhs.isEmpty()}"
                  th:src="@{/Content/HinhAnhPhongVu/no-image.jpg}"
                  style="width: 100%; height: 100%; object-fit: contain; opacity: 0.6" alt="No Image" />
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-8">
          <h4 class="text-primary mb-3">
            Sản phẩm:
            <span class="text-dark" th:text="${sanPham.tenSP}"></span>
          </h4>

          <hr />

          <dl class="row">
            <dt class="col-sm-5">Mã sản phẩm:</dt>
            <dd class="col-sm-7" th:text="${sanPham.maSP}"></dd>

            <dt class="col-sm-5">Số lượng tồn:</dt>
            <dd class="col-sm-7" th:text="${sanPham.soLuongTon}"></dd>

            <dt class="col-sm-5">Đơn giá bán:</dt>
            <dd class="col-sm-7">
              <strong class="text-danger"
                th:text="${#numbers.formatDecimal(sanPham.donGiaSP, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></strong>
            </dd>

            <dt class="col-sm-5">Loại sản phẩm:</dt>
            <dd class="col-sm-7" th:text="${sanPham.loaiSanPham != null ? sanPham.loaiSanPham.tenLoai : 'Chưa có'}">
            </dd>

            <dt class="col-sm-5">Nhà sản xuất:</dt>
            <dd class="col-sm-7" th:text="${sanPham.nhaSanXuat != null ? sanPham.nhaSanXuat.tenNSX : 'Chưa có'}"></dd>
          </dl>
        </div>
      </div>
    </div>
  </div>

  <form th:action="@{/admin/delete-sp}" method="post">
    <input type="hidden" name="maSP" th:value="${sanPham.maSP}" />

    <div class="form-actions mt-4 text-center">
      <button type="submit" class="btn btn-danger btn-lg me-3">
        <i class="fas fa-trash-alt"></i> Xác nhận Xóa
      </button>

      <a th:href="@{/admin/ql-sanpham}" class="btn btn-secondary btn-lg">
        <i class="fas fa-arrow-left"></i> Hủy và Quay lại
      </a>
    </div>
  </form>
  </div>
</body>

</html>
