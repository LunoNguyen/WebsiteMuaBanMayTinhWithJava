<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{shared/_LayoutAdmin :: layout(~{::div.container-fluid})}">

<body>
  <div class="container-fluid px-4 mt-4">
    <h2 class="mb-4">CHỈNH SỬA SẢN PHẨM</h2>
    <form th:action="@{/admin/edit-sp}" method="post">
      <input type="hidden" name="maSP" th:value="${sanPham.maSP}" />

      <div class="form-horizontal bg-white p-4 shadow-sm border rounded">
        <div class="form-group mb-3 row">
          <label class="col-md-2 col-form-label fw-bold">Tên sản phẩm</label>
          <div class="col-md-10">
            <input type="text" name="tenSP" class="form-control" th:value="${sanPham.tenSP}" required />
          </div>
        </div>

        <div class="form-group mb-3 row">
          <label class="col-md-2 col-form-label fw-bold">Đơn vị tính</label>
          <div class="col-md-10">
            <input type="text" name="donVT" class="form-control" th:value="${sanPham.donVT}" />
          </div>
        </div>

        <div class="form-group mb-3 row">
          <label class="col-md-2 col-form-label fw-bold">Số lượng tồn</label>
          <div class="col-md-10">
            <input type="number" name="soLuongTon" class="form-control" th:value="${sanPham.soLuongTon}" min="0" />
          </div>
        </div>

        <div class="form-group mb-3 row">
          <label class="col-md-2 col-form-label fw-bold">Đơn giá</label>
          <div class="col-md-10">
            <input type="number" name="donGiaSP" class="form-control" th:value="${sanPham.donGiaSP}" min="0"
              step="1000" />
          </div>
        </div>

        <div class="form-group mb-3 row">
          <label class="col-md-2 col-form-label fw-bold">Loại SP</label>
          <div class="col-md-10">
            <select name="maLoai" class="form-select">
              <option th:each="loai : ${dsLoai}" th:value="${loai.maLoai}" th:text="${loai.tenLoai}"
                th:selected="${loai.maLoai == sanPham.maLoai}"></option>
            </select>
          </div>
        </div>

        <div class="form-group mb-3 row">
          <label class="col-md-2 col-form-label fw-bold">Nhà Cung Cấp</label>
          <div class="col-md-10">
            <select name="maNCC" class="form-select">
              <option th:each="ncc : ${dsNCC}" th:value="${ncc.maNCC}" th:text="${ncc.tenNCC}"
                th:selected="${ncc.maNCC == sanPham.maNCC}"></option>
            </select>
          </div>
        </div>

        <div class="form-group mb-3 row">
          <label class="col-md-2 col-form-label fw-bold">Nhà Sản Xuất</label>
          <div class="col-md-10">
            <select name="maNSX" class="form-select">
              <option th:each="nsx : ${dsNSX}" th:value="${nsx.maNSX}" th:text="${nsx.tenNSX}"
                th:selected="${nsx.maNSX == sanPham.maNSX}"></option>
            </select>
          </div>
        </div>

        <div class="form-group mt-4">
          <button type="submit" class="btn btn-warning">
            <i class="fas fa-save"></i> Lưu lại
          </button>

          <a th:href="@{/admin/ql-sanpham}" class="btn btn-secondary ms-2">
            Quay lại danh sách
          </a>
        </div>
      </div>
    </form>
  </div>
</body>

</html>
