<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{shared/_LayoutAdmin :: layout(~{::div.container-fluid})}">

<body>
  <div class="container-fluid px-4 mt-4">
    <h2 class="mb-4">CHINH SUA SAN PHAM</h2>

    <form th:action="@{/admin/edit-sp}" method="post" enctype="multipart/form-data">
      <input type="hidden" name="maSP" th:value="${sanPham.maSP}" />

      <div class="form-horizontal bg-white p-4 shadow-sm border rounded">
        <h5 class="fw-bold text-primary mb-3">Thong tin co ban</h5>

        <div class="form-group mb-3 row">
          <label class="col-md-2 col-form-label fw-bold">Ten san pham</label>
          <div class="col-md-10">
            <input type="text" name="tenSP" class="form-control" th:value="${sanPham.tenSP}" required />
          </div>
        </div>

        <div class="form-group mb-3 row">
          <label class="col-md-2 col-form-label fw-bold">Don vi tinh</label>
          <div class="col-md-10">
            <input type="text" name="donVT" class="form-control" th:value="${sanPham.donVT}" />
          </div>
        </div>

        <div class="form-group mb-3 row">
          <label class="col-md-2 col-form-label fw-bold">So luong ton</label>
          <div class="col-md-10">
            <input type="number" name="soLuongTon" class="form-control" th:value="${sanPham.soLuongTon}" min="0" />
          </div>
        </div>

        <div class="form-group mb-3 row">
          <label class="col-md-2 col-form-label fw-bold">Don gia</label>
          <div class="col-md-10">
            <input type="number" name="donGiaSP" class="form-control" th:value="${sanPham.donGiaSP}" min="0" step="1000" />
          </div>
        </div>

        <div class="form-group mb-3 row">
          <label class="col-md-2 col-form-label fw-bold">Loai SP</label>
          <div class="col-md-10">
            <select name="maLoai" class="form-select">
              <option th:each="loai : ${dsLoai}" th:value="${loai.maLoai}" th:text="${loai.tenLoai}"
                th:selected="${loai.maLoai == sanPham.maLoai}"></option>
            </select>
          </div>
        </div>

        <div class="form-group mb-3 row">
          <label class="col-md-2 col-form-label fw-bold">Nha cung cap</label>
          <div class="col-md-10">
            <select name="maNCC" class="form-select">
              <option th:each="ncc : ${dsNCC}" th:value="${ncc.maNCC}" th:text="${ncc.tenNCC}"
                th:selected="${ncc.maNCC == sanPham.maNCC}"></option>
            </select>
          </div>
        </div>

        <div class="form-group mb-3 row">
          <label class="col-md-2 col-form-label fw-bold">Nha san xuat</label>
          <div class="col-md-10">
            <select name="maNSX" class="form-select">
              <option th:each="nsx : ${dsNSX}" th:value="${nsx.maNSX}" th:text="${nsx.tenNSX}"
                th:selected="${nsx.maNSX == sanPham.maNSX}"></option>
            </select>
          </div>
        </div>

        <div class="mt-4 border-top pt-3">
          <h5 class="fw-bold text-primary mb-3">Mo ta san pham</h5>

          <div class="row mb-3">
            <label class="col-md-2 col-form-label fw-bold">CPU</label>
            <div class="col-md-4">
              <input type="text" name="cpu" class="form-control" th:value="${moTa.cpu}" />
            </div>

            <label class="col-md-2 col-form-label fw-bold text-end">RAM</label>
            <div class="col-md-4">
              <input type="text" name="ram" class="form-control" th:value="${moTa.ram}" />
            </div>
          </div>

          <div class="row mb-3">
            <label class="col-md-2 col-form-label fw-bold">ROM</label>
            <div class="col-md-4">
              <input type="text" name="rom" class="form-control" th:value="${moTa.rom}" />
            </div>

            <label class="col-md-2 col-form-label fw-bold text-end">Man hinh</label>
            <div class="col-md-4">
              <input type="text" name="manHinh" class="form-control" th:value="${moTa.manHinh}" />
            </div>
          </div>

          <div class="row mb-3">
            <label class="col-md-2 col-form-label fw-bold">VGA</label>
            <div class="col-md-4">
              <input type="text" name="vga" class="form-control" th:value="${moTa.vga}" />
            </div>

            <label class="col-md-2 col-form-label fw-bold text-end">Khac</label>
            <div class="col-md-4">
              <input type="text" name="khac" class="form-control" th:value="${moTa.khac}" />
            </div>
          </div>
        </div>

        <div class="mt-4 border-top pt-3">
          <h5 class="fw-bold text-primary mb-3">Hinh anh san pham</h5>

          <div class="row g-2 mb-3" th:if="${sanPham.danhSachAnhs != null and !sanPham.danhSachAnhs.isEmpty()}">
            <div class="col-6 col-md-3" th:each="anh : ${sanPham.danhSachAnhs}">
              <div class="border rounded p-2 text-center bg-light">
                <img th:src="@{/Content/HinhAnhPhongVu/{file}(file=${anh.tenAnh})}"
                  style="width: 100%; height: 120px; object-fit: contain" alt="Anh san pham" />
              </div>
            </div>
          </div>

          <div class="alert alert-secondary py-2" th:unless="${sanPham.danhSachAnhs != null and !sanPham.danhSachAnhs.isEmpty()}">
            San pham chua co anh.
          </div>

          <input type="file" name="fileAnhs" accept="image/*" class="form-control" multiple />
          <small class="text-muted">
            Neu chon anh moi, toan bo anh cu se bi thay the. Neu de trong, anh cu duoc giu nguyen.
          </small>
        </div>

        <div class="form-group mt-4">
          <button type="submit" class="btn btn-warning">
            <i class="fas fa-save"></i> Luu lai
          </button>

          <a th:href="@{/admin/ql-sanpham}" class="btn btn-secondary ms-2">
            Quay lai danh sach
          </a>
        </div>
      </div>
    </form>
  </div>
</body>

</html>
