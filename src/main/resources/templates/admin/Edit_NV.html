<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{shared/_LayoutAdmin :: layout(~{::div.container-fluid})}"
>
  <body>
    <div class="container-fluid px-4">
      <h1 class="mt-4">Chỉnh sửa Nhân Viên</h1>
      <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item">
          <a th:href="@{/admin/trang-admin}">Tổng quan</a>
        </li>
        <li class="breadcrumb-item">
          <a th:href="@{/admin/ql-nhanvien}">Quản lý Nhân Viên</a>
        </li>
        <li class="breadcrumb-item active">Chỉnh sửa</li>
      </ol>
      <div class="card mb-4 shadow-sm">
        <div class="card-header bg-warning text-dark fw-bold">
          <i class="fas fa-user-edit me-1"></i> Cập nhật thông tin
        </div>
        <div class="card-body">
          <form
            th:action="@{/admin/edit-nv}"
            method="post"
            th:object="${nhanVien}"
          >
            <div class="row mb-3">
              <label class="col-sm-2 col-form-label fw-bold"
                >Mã NV (Không sửa)</label
              >
              <div class="col-sm-10">
                <input
                  type="text"
                  th:field="*{maNV}"
                  class="form-control bg-light"
                  readonly
                />
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-sm-2 col-form-label fw-bold"
                >Chức Vụ <span class="text-danger">*</span></label
              >
              <div class="col-sm-10">
                <select th:field="*{maCV}" class="form-select" required>
                  <option value="">--- Chọn chức vụ ---</option>
                  <option
                    th:each="cv : ${dsChucVu}"
                    th:value="${cv.maCV}"
                    th:text="${cv.tenCV}"
                  ></option>
                </select>
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-sm-2 col-form-label fw-bold"
                >Họ và Tên <span class="text-danger">*</span></label
              >
              <div class="col-sm-10">
                <input
                  type="text"
                  th:field="*{tenNV}"
                  class="form-control"
                  required
                />
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-sm-2 col-form-label fw-bold">Email</label>
              <div class="col-sm-10">
                <input
                  type="email"
                  th:field="*{emailNV}"
                  class="form-control"
                />
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-sm-2 col-form-label fw-bold"
                >Số Điện Thoại</label
              >
              <div class="col-sm-10">
                <input type="text" th:field="*{sdtNV}" class="form-control" />
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-sm-2 col-form-label fw-bold">Địa Chỉ</label>
              <div class="col-sm-10">
                <textarea
                  th:field="*{diaChiNV}"
                  class="form-control"
                  rows="3"
                ></textarea>
              </div>
            </div>

            <div class="row mt-4">
              <div class="col-sm-10 offset-sm-2">
                <button
                  type="submit"
                  class="btn btn-warning fw-bold text-dark me-2"
                >
                  <i class="fas fa-save me-1"></i> Lưu Cập Nhật
                </button>
                <a th:href="@{/admin/ql-nhanvien}" class="btn btn-secondary"
                  >Quay lại</a
                >
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
