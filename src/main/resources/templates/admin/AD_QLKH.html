<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{shared/_LayoutAdmin :: layout(~{::div.container-fluid})}"
>
  <body>
    <div class="container-fluid px-4">
      <h1 class="mt-4">Quản lý Khách hàng</h1>
      <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item">
          <a th:href="@{/admin/trang-admin}">Tổng quan</a>
        </li>
        <li class="breadcrumb-item active">Danh sách Khách hàng</li>
      </ol>

      <div
        th:if="${Success != null}"
        class="alert alert-success alert-dismissible fade show"
        role="alert"
      >
        <span th:text="${Success}"></span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="Close"
        ></button>
      </div>
      <div
        th:if="${Error != null}"
        class="alert alert-danger alert-dismissible fade show"
        role="alert"
      >
        <span th:text="${Error}"></span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="Close"
        ></button>
      </div>

      <div class="card mb-4 shadow-sm">
        <div
          class="card-header d-flex justify-content-between align-items-center"
        >
          <span class="fw-bold"
            ><i class="fas fa-users me-1"></i> Danh sách Khách hàng</span
          >

          <a th:href="@{/admin/create-kh}" class="btn btn-primary btn-sm">
            Thêm Khách Hàng
          </a>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table
              class="table table-bordered table-hover table-striped align-middle"
            >
              <thead class="table-dark text-center">
                <tr>
                  <th>ID</th>
                  <th>Tên khách hàng</th>
                  <th>Email</th>
                  <th>Số điện thoại</th>
                  <th>Địa chỉ</th>
                  <th style="width: 180px">Hành động</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="item : ${QLKH}">
                  <td class="text-center" th:text="${item.maKH}"></td>
                  <td class="fw-bold" th:text="${item.tenKH}"></td>
                  <td th:text="${item.emailKH}"></td>
                  <td class="text-center" th:text="${item.sdtKH}"></td>
                  <td th:text="${item.diaChiKH}"></td>
                  <td class="text-center">
                    <div class="d-flex justify-content-center gap-1">
                      <a
                        th:href="@{'/admin/edit-kh/' + ${item.maKH}}"
                        class="btn btn-warning btn-sm text-dark fw-semibold"
                      >
                        Sửa
                      </a>

                      <form
                        th:action="@{'/admin/xoa-khachhang/' + ${item.maKH}}"
                        method="post"
                        onsubmit="
                          return confirm(
                            'Bạn có chắc chắn muốn xóa khách hàng này?',
                          );
                        "
                      >
                        <button
                          type="submit"
                          class="btn btn-danger btn-sm fw-semibold"
                        >
                          Xóa
                        </button>
                      </form>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
