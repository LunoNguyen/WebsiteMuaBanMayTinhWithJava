<!doctype html>
<html
        xmlns:th="http://www.thymeleaf.org"
        th:replace="~{shared/_LayoutAdmin :: layout(~{::div.container-fluid})}"
>
<body>
<div class="container-fluid px-4">
    <h1 class="mt-4">Quản lý Phiếu Nhập Hàng</h1>
    <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item">
            <a th:href="@{/admin/trang-admin}">Tổng quan</a>
        </li>
        <li class="breadcrumb-item active">Quản lý Phiếu Nhập Hàng</li>
    </ol>

    <div th:if="${Success != null}" class="alert alert-success alert-dismissible fade show">
        <strong>Thành công!</strong> <span th:text="${Success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${Error != null}" class="alert alert-danger alert-dismissible fade show">
        <strong>Lỗi!</strong> <span th:text="${Error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-header fw-bold">
            <i class="fas fa-file-invoice me-1"></i> Danh sách Phiếu Nhập Hàng
        </div>
        <div class="card-body">

            <div class="row g-2 mb-3">
                <div class="col-lg-3 col-md-6">
                    <input type="search" id="pnhSearch" class="form-control"
                           placeholder="Tìm theo mã phiếu hoặc nhà cung cấp" />
                </div>
                <div class="col-lg-2 col-md-6">
                    <select id="pnhStatus" class="form-select">
                        <option value="">Tất cả trạng thái</option>
                        <option value="Chưa thanh toán">Chưa thanh toán</option>
                        <option value="Đã thanh toán">Đã thanh toán</option>
                        <option value="Đã hủy">Đã hủy</option>
                    </select>
                </div>
                <div class="col-lg-2 col-md-6">
                    <input type="date" id="pnhFromDate" class="form-control" title="Từ ngày giao" />
                </div>
                <div class="col-lg-2 col-md-6">
                    <input type="date" id="pnhToDate" class="form-control" title="Đến ngày giao" />
                </div>
                <div class="col-lg-3 col-md-6">
                    <a th:href="@{/admin/nhap-hang}" class="btn btn-primary w-100">
                        <i class="fas fa-plus me-1"></i> Tạo Phiếu Nhập Mới
                    </a>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-bordered align-middle">
                    <thead class="table-dark text-center">
                    <tr>
                        <th>Mã Phiếu</th>
                        <th>Nhà Cung Cấp</th>
                        <th>Ngày Giao</th>
                        <th>Ngày Nhận</th>
                        <th class="text-end">Thuế VAT</th>
                        <th class="text-end">Chiết Khấu</th>
                        <th class="text-end">Tổng Cộng</th>
                        <th style="min-width: 240px">Trạng thái & Cập nhật</th>
                        <th>Xóa</th>
                    </tr>
                    </thead>
                    <tbody id="pnhTableBody">
                    <tr
                            th:each="item : ${listPNH}"
                            th:data-search="${item.maPNH + ' ' + (TenNCC[item.maNCC] != null ? TenNCC[item.maNCC] : item.maNCC)}"
                            th:data-status="${item.trangThaiThanhToan}"
                            th:data-date="${item.ngayGiao != null ? #temporals.format(item.ngayGiao, 'yyyy-MM-dd') : ''}"
                    >
                        <td class="fw-bold text-center" th:text="${item.maPNH}"></td>

                        <td th:text="${TenNCC[item.maNCC] != null ? TenNCC[item.maNCC] : item.maNCC}"></td>

                        <td class="text-center"
                            th:text="${item.ngayGiao != null ? #temporals.format(item.ngayGiao, 'dd/MM/yyyy HH:mm') : '-'}">
                        </td>

                        <td class="text-center"
                            th:text="${item.ngayNhan != null ? #temporals.format(item.ngayNhan, 'dd/MM/yyyy HH:mm') : '-'}">
                        </td>

                        <td class="text-end"
                            th:text="${item.thueVAT != null ? #numbers.formatDecimal(item.thueVAT, 0, 'COMMA', 0, 'POINT') + ' đ' : '0 đ'}">
                        </td>

                        <td class="text-end"
                            th:text="${item.chietKhau != null ? #numbers.formatDecimal(item.chietKhau, 0, 'COMMA', 0, 'POINT') + ' đ' : '0 đ'}">
                        </td>

                        <td class="text-end fw-bold text-success">
                            <span th:if="${item.tongCong != null}"
                                  th:text="${#numbers.formatDecimal(item.tongCong, 1, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                            <span th:unless="${item.tongCong != null}">-</span>
                        </td>

                        <td class="text-center">
                            <th:block th:if="${item.trangThaiThanhToan == 'Đã hủy'}">
                                <span class="badge bg-danger fs-6">Đã hủy</span>
                            </th:block>

                            <th:block th:unless="${item.trangThaiThanhToan == 'Đã hủy'}">
                                <form th:action="@{/admin/capnhat-trangthai-phieunhap}" method="post"
                                      class="d-flex justify-content-center">
                                    <input type="hidden" name="maPNH" th:value="${item.maPNH}" />
                                    <div class="input-group input-group-sm">
                                        <select name="newStatus" class="form-select fw-bold" style="width: 150px">
                                            <option th:each="st : ${ {'Chưa thanh toán', 'Đã thanh toán', 'Đã hủy'} }"
                                                    th:value="${st}" th:text="${st}"
                                                    th:selected="${item.trangThaiThanhToan == st}">
                                            </option>
                                        </select>
                                        <button type="submit" class="btn btn-warning text-dark fw-bold" title="Lưu trạng thái">
                                            Lưu
                                        </button>
                                    </div>
                                </form>
                            </th:block>
                        </td>

                        <td class="text-center">
                            <form th:action="@{/admin/xoa-phieunhap/{id}(id=${item.maPNH})}"
                                  method="post"
                                  onsubmit="return confirm('Bạn có chắc muốn xóa phiếu ' + /*[[${item.maPNH}]]*/ '' + '?')">
                                <button type="submit" class="btn btn-danger btn-sm">
                                    <i class="fas fa-trash"></i> Xóa
                                </button>
                            </form>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(listPNH)}">
                        <td colspan="8" class="text-center text-muted py-4">
                            <i class="fas fa-inbox me-2"></i>Chưa có phiếu nhập hàng nào.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <script>
        (() => {
            const search   = document.getElementById("pnhSearch");
            const status   = document.getElementById("pnhStatus");
            const fromDate = document.getElementById("pnhFromDate");
            const toDate   = document.getElementById("pnhToDate");
            const rows     = Array.from(document.querySelectorAll("#pnhTableBody tr[data-search]"));

            const normalize = (v) => (v || "").toString().toLowerCase()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "");

            const filterRows = () => {
                const keyword  = normalize(search.value);
                const selStatus = status.value;
                const start    = fromDate.value;
                const end      = toDate.value;

                rows.forEach((row) => {
                    const rowDate = row.dataset.date || "";
                    const visible =
                        normalize(row.dataset.search).includes(keyword) &&
                        (!selStatus || row.dataset.status === selStatus) &&
                        (!start || rowDate >= start) &&
                        (!end   || rowDate <= end);
                    row.style.display = visible ? "" : "none";
                });
            };

            [search, status, fromDate, toDate].forEach((el) => {
                el.addEventListener("input",  filterRows);
                el.addEventListener("change", filterRows);
            });
        })();
    </script>

</div>
</body>
</html>
