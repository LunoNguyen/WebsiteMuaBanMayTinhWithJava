<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{shared/_LayoutTrangChu :: layout(~{::body})}"
>
  <head>
    <title>Lịch sử đơn hàng</title>
  </head>
  <body>
    <div class="container py-5">
      <h3 class="text-center text-primary mb-4 text-uppercase">
        Lịch sử mua hàng
      </h3>

      <div
        th:if="${listDonHang == null or listDonHang.isEmpty()}"
        class="alert alert-info text-center"
      >
        Bạn chưa có đơn hàng nào.
        <a th:href="@{/trang-chu}" class="fw-bold text-decoration-none"
          >Mua sắm ngay!</a
        >
      </div>

      <div
        th:unless="${listDonHang == null or listDonHang.isEmpty()}"
        class="card shadow-sm"
      >
        <div class="card-body p-0">
          <table class="table table-hover align-middle mb-0">
            <thead class="bg-primary text-white">
              <tr>
                <th class="ps-4">Mã Đơn</th>
                <th>Ngày đặt</th>
                <th>Tổng tiền</th>
                <th>Trạng thái</th>
                <th class="text-center">Thao tác</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="item : ${listDonHang}">
                <td class="ps-4 fw-bold" th:text="${item.maHD}"></td>
                <td
                  th:text="${#temporals.format(item.ngayLap, 'dd/MM/yyyy HH:mm')}"
                ></td>
                <td
                  class="text-danger fw-bold"
                  th:text="${#numbers.formatDecimal(item.tongTienHD, 0, 'COMMA', 0, 'POINT')} + ' đ'"
                ></td>
                <td>
                  <span
                    th:if="${#strings.containsIgnoreCase(item.trangThaiTT, 'đặt')}"
                    class="badge bg-primary text-white"
                    th:text="${item.trangThaiTT}"
                  ></span>
                  <span
                    th:if="${#strings.containsIgnoreCase(item.trangThaiTT, 'hủy')}"
                    class="badge bg-danger text-white"
                    th:text="${item.trangThaiTT}"
                  ></span>
                  <span
                    th:if="${!#strings.containsIgnoreCase(item.trangThaiTT, 'đặt') and !#strings.containsIgnoreCase(item.trangThaiTT, 'hủy')}"
                    class="badge bg-success text-white"
                    th:text="${item.trangThaiTT}"
                  ></span>
                </td>
                <td class="text-center">
                  <a
                    th:href="@{'/tai-khoan/chi-tiet-don-hang/' + ${item.maHD}}"
                    class="btn btn-sm btn-outline-primary"
                  >
                    <i class="bi bi-eye-fill"></i> Xem chi tiết
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
