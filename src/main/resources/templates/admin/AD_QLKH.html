<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{shared/_LayoutAdmin :: layout(~{::div.container-fluid})}"
>
  <body>
    <div class="container-fluid px-4">
      <h1 class="mt-4">Quản lý Khách hàng</h1>
      <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item">
          <a th:href="@{/admin/trang-admin}">Tổng quan</a>
        </li>
        <li class="breadcrumb-item active">Danh sách Khách hàng</li>
      </ol>

      <div
        th:if="${Success != null}"
        class="alert alert-success alert-dismissible fade show"
        role="alert"
      >
        <span th:text="${Success}"></span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="Close"
        ></button>
      </div>
      <div
        th:if="${Error != null}"
        class="alert alert-danger alert-dismissible fade show"
        role="alert"
      >
        <span th:text="${Error}"></span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="Close"
        ></button>
      </div>

      <div class="card mb-4 shadow-sm">
        <div
          class="card-header d-flex justify-content-between align-items-center"
        >
          <span class="fw-bold"
            ><i class="fas fa-users me-1"></i> Danh sách Khách hàng</span
          >

          <a th:href="@{/admin/create-kh}" class="btn btn-primary btn-sm">
            Thêm Khách Hàng
          </a>
        </div>
        <div class="card-body">
          <div class="row g-2 mb-3">
            <div class="col-md-8">
              <input
                type="search"
                id="khSearch"
                class="form-control"
                placeholder="Tim theo ma, ten, email, so dien thoai, dia chi"
              />
            </div>
            <div class="col-md-4">
              <input
                type="search"
                id="khAddress"
                class="form-control"
                placeholder="Loc theo dia chi"
              />
            </div>
          </div>
          <div class="table-responsive">
            <table
              class="table table-bordered table-hover table-striped align-middle"
            >
              <thead class="table-dark text-center">
                <tr>
                  <th>ID</th>
                  <th>Tên khách hàng</th>
                  <th>Email</th>
                  <th>Số điện thoại</th>
                  <th>Địa chỉ</th>
                  <th style="width: 180px">Hành động</th>
                </tr>
              </thead>
              <tbody id="khTableBody">
                <tr
                  th:each="item : ${QLKH}"
                  th:data-search="${item.maKH + ' ' + item.tenKH + ' ' + item.emailKH + ' ' + item.sdtKH + ' ' + item.diaChiKH}"
                  th:data-address="${item.diaChiKH}"
                >
                  <td class="text-center" th:text="${item.maKH}"></td>
                  <td class="fw-bold" th:text="${item.tenKH}"></td>
                  <td th:text="${item.emailKH}"></td>
                  <td class="text-center" th:text="${item.sdtKH}"></td>
                  <td th:text="${item.diaChiKH}"></td>
                  <td class="text-center">
                    <div class="d-flex justify-content-center gap-1">
                      <a
                        th:href="@{'/admin/edit-kh/' + ${item.maKH}}"
                        class="btn btn-warning btn-sm text-dark fw-semibold"
                      >
                        Sửa
                      </a>

                      <form
                        th:action="@{'/admin/xoa-khachhang/' + ${item.maKH}}"
                        method="post"
                        onsubmit="
                          return confirm(
                            'Bạn có chắc chắn muốn xóa khách hàng này?',
                          );
                        "
                      >
                        <button
                          type="submit"
                          class="btn btn-danger btn-sm fw-semibold"
                        >
                          Xóa
                        </button>
                      </form>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <script>
        (() => {
          const search = document.getElementById("khSearch");
          const address = document.getElementById("khAddress");
          const rows = Array.from(document.querySelectorAll("#khTableBody tr"));

          const normalize = (value) => (value || "").toString().toLowerCase();
          const filterRows = () => {
            const keyword = normalize(search.value);
            const addressKeyword = normalize(address.value);

            rows.forEach((row) => {
              const rowText = normalize(row.dataset.search);
              const rowAddress = normalize(row.dataset.address);
              row.style.display =
                rowText.includes(keyword) && rowAddress.includes(addressKeyword)
                  ? ""
                  : "none";
            });
          };

          search.addEventListener("input", filterRows);
          address.addEventListener("input", filterRows);
        })();
      </script>
    </div>
  </body>
</html>
