<!doctype html>
<html
        xmlns:th="http://www.thymeleaf.org"
        th:replace="~{shared/_LayoutAdmin :: layout(~{::div.container-fluid})}"
>
<body>
<div class="container-fluid px-4">
  <h1 class="mt-4">Quản lý Nhập Hàng</h1>
  <ol class="breadcrumb mb-4">
    <li class="breadcrumb-item">
      <a th:href="@{/admin/trang-admin}">Tổng quan</a>
    </li>
    <li class="breadcrumb-item active">Nhập kho</li>
  </ol>

  <div
          th:if="${Success != null}"
          class="alert alert-success alert-dismissible fade show"
  >
    <strong>Thành công!</strong> <span th:text="${Success}"></span>
    <button
            type="button"
            class="btn-close"
            data-bs-dismiss="alert"
    ></button>
  </div>
  <div
          th:if="${Error != null}"
          class="alert alert-danger alert-dismissible fade show"
  >
    <strong>Lỗi!</strong> <span th:text="${Error}"></span>
    <button
            type="button"
            class="btn-close"
            data-bs-dismiss="alert"
    ></button>
  </div>

  <div class="row">
    <div class="col-12">
      <div class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white fw-bold">
          <i class="bi bi-keyboard"></i> Nhập Sản Phẩm Mới (Thủ công)
        </div>
        <div class="card-body">
          <form
                  th:action="@{/admin/nhap-thu-cong}"
                  method="post"
                  enctype="multipart/form-data"
          >
            <div class="mb-4 p-3 border border-primary rounded bg-light">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="isOldSP" name="isOldSP" value="true" onchange="toggleProductMode()">
                <label class="form-check-label fw-bold text-primary" for="isOldSP">🔄 Nhập Thêm Số Lượng Cho Sản Phẩm Đã Có Sẵn</label>
              </div>

              <div id="oldSPFields" class="mt-3" style="display: none;">
                <label class="form-label fw-bold small text-danger">Chọn sản phẩm muốn nhập thêm <span class="text-danger">*</span></label>
                <select id="selectOldSP" name="maSPDaCo" class="form-select" onchange="fillProductDetails()">
                  <option value="">-- Chọn sản phẩm hiện có --</option>
                  <th:block th:each="spHienCo : ${dsSanPhamHienCo}">
                    <option th:each="mtHienCo : ${dsMoTaHienCo}"
                            th:if="${spHienCo.maSP == mtHienCo.maSP}"
                            th:value="${spHienCo.maSP}"
                            th:text="${spHienCo.maSP + ' - ' + spHienCo.tenSP}"
                            th:data-ten="${spHienCo.tenSP}"
                            th:data-gia="${spHienCo.donGiaSP}"
                            th:data-donvi="${spHienCo.donVT}"
                            th:data-loai="${spHienCo.maLoai}"
                            th:data-nsx="${spHienCo.maNSX}"
                            th:data-ncc="${spHienCo.maNCC}"
                            th:data-cpu="${mtHienCo.cpu}"
                            th:data-ram="${mtHienCo.ram}"
                            th:data-rom="${mtHienCo.rom}"
                            th:data-vga="${mtHienCo.vga}"
                            th:data-manhinh="${mtHienCo.manHinh}"
                            th:data-khac="${mtHienCo.khac}"
                            th:data-anh="${mapAnhSanPham[spHienCo.maSP]}">
                    </option>
                  </th:block>
                </select>
              </div>
            </div>
            <h6 class="text-primary fw-bold border-bottom pb-2 mb-3">
              1. Thông tin cơ bản
            </h6>
            <div class="row mb-3">
              <div class="col-md-8">
                <label class="form-label fw-bold small">Tên sản phẩm</label>
                <input
                        type="text"
                        name="tenSP"
                        class="form-control"
                        required
                        placeholder="VD: Laptop Dell XPS 13"
                />
              </div>
              <div class="col-md-4">
                <label class="form-label fw-bold small">Đơn vị tính</label>
                <input
                        type="text"
                        name="donVT"
                        class="form-control"
                        placeholder="Cái/Bộ"
                />
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-bold small"
                >Giá bán (VNĐ)</label
                >
                <input
                        type="number"
                        name="donGiaSP"
                        class="form-control"
                        required
                />
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold small">Số lượng nhập</label>
                <input
                        type="number"
                        name="soLuongTon"
                        class="form-control"
                        required
                />
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-4">
                <label class="form-label fw-bold small">Loại SP</label>
                <select name="maLoai" class="form-select" required>
                  <option value="">-- Chọn Loại SP --</option>
                  <option
                          th:each="loai : ${dsLoai}"
                          th:value="${loai.maLoai}"
                          th:text="${loai.tenLoai}"
                  ></option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-bold small">Nhà Sản Xuất</label>
                <select name="maNSX" class="form-select" required>
                  <option value="">-- Chọn Nhà SX --</option>
                  <option
                          th:each="nsx : ${dsNSX}"
                          th:value="${nsx.maNSX}"
                          th:text="${nsx.tenNSX}"
                  ></option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label fw-bold small">Nhà Cung Cấp</label>
                <select name="maNCC" id="selectNCC" class="form-select" required>
                  <option value="">-- Chọn Nhà CC --</option>
                  <option
                          th:each="ncc : ${dsNCC}"
                          th:value="${ncc.maNCC}"
                          th:text="${ncc.tenNCC}"
                  ></option>
                </select>
              </div>
            </div>

            <div class="mb-3">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="isNewNCC" name="isNewNCC" value="true" onchange="toggleNewNCCFields()">
                <label class="form-check-label fw-bold text-success" for="isNewNCC">➕ Thêm Nhà Cung Cấp Mới</label>
              </div>
            </div>

            <div id="newNCCFields" class="p-3 mb-3 border border-success rounded bg-light" style="display: none;">
              <h6 class="text-success fw-bold border-bottom pb-1 mb-2">Thông tin Nhà Cung Cấp mới</h6>
              <div class="row">
                <div class="col-md-4 mb-2">
                  <label class="small fw-bold">Tên nhà cung cấp <span class="text-danger">*</span></label>
                  <input type="text" id="tenNCCMoi" name="tenNCCMoi" class="form-control form-control-sm" placeholder="VD: Công ty TNHH ABC">
                </div>
                <div class="col-md-4 mb-2">
                  <label class="small fw-bold">Số điện thoại</label>
                  <input type="text" name="sdtNCCMoi" class="form-control form-control-sm" placeholder="VD: 0987654321">
                </div>
                <div class="col-md-4 mb-2">
                  <label class="small fw-bold">Địa chỉ</label>
                  <input type="text" name="diaChiNCCMoi" class="form-control form-control-sm" placeholder="VD: 123 Đường 3/2, Q.10">
                </div>
              </div>
            </div>

            <h6 class="text-primary fw-bold border-bottom pb-2 mb-3 mt-4">
              2. Cấu hình chi tiết
            </h6>
            <div class="row mb-2">
              <div class="col-md-6 mb-2">
                <label class="small text-muted">CPU (Vi xử lý)</label>
                <input
                        type="text"
                        name="cpu"
                        class="form-control form-control-sm"
                        placeholder="VD: Intel Core i7 1360P"
                />
              </div>
              <div class="col-md-6 mb-2">
                <label class="small text-muted">RAM</label>
                <input
                        type="text"
                        name="ram"
                        class="form-control form-control-sm"
                        placeholder="VD: 16GB DDR5"
                />
              </div>
              <div class="col-md-6 mb-2">
                <label class="small text-muted">Ổ cứng (ROM)</label>
                <input
                        type="text"
                        name="rom"
                        class="form-control form-control-sm"
                        placeholder="VD: 512GB SSD"
                />
              </div>
              <div class="col-md-6 mb-2">
                <label class="small text-muted">VGA (Card đồ họa)</label>
                <input
                        type="text"
                        name="vga"
                        class="form-control form-control-sm"
                        placeholder="VD: Nvidia RTX 4050"
                />
              </div>
              <div class="col-md-6 mb-2">
                <label class="small text-muted">Màn hình</label>
                <input
                        type="text"
                        name="manHinh"
                        class="form-control form-control-sm"
                        placeholder="VD: 14 inch OLED"
                />
              </div>
              <div class="col-md-6 mb-2">
                <label class="small text-muted">Thông tin khác</label>
                <input
                        type="text"
                        name="khac"
                        class="form-control form-control-sm"
                        placeholder="VD: Vỏ nhôm, Pin 4 cell..."
                />
              </div>
            </div>

            <h6 class="text-primary fw-bold border-bottom pb-2 mb-3 mt-4">
              3. Hình ảnh
            </h6>
            <div class="mb-3">
              <input
                      type="file"
                      name="fileAnh"
                      class="form-control"
                      accept="image/*"
              />
              <div id="oldImagePreview" class="mt-2" style="display: none;">
                <label class="small text-muted d-block mb-1">Ảnh hiện tại của sản phẩm:</label>
                <img id="imgPreview" src="" alt="Ảnh sản phẩm" class="img-thumbnail" style="max-height: 150px;">
              </div>
            </div>

            <h6 class="text-primary fw-bold border-bottom pb-2 mb-3 mt-4">
              4. Thông tin Phiếu Nhập Hàng
            </h6>
            <div class="row mb-3">
              <div class="col-md-4">
                <label class="form-label fw-bold small">Thuế VAT (%)</label>
                <input
                        type="number"
                        name="thueVAT"
                        id="thueVAT"
                        class="form-control"
                        min="0" max="100" step="0.1"
                        value="10"
                        oninput="tinhLaiTong()"
                />
              </div>
              <div class="col-md-4">
                <label class="form-label fw-bold small">Chiết khấu (%)</label>
                <input
                        type="number"
                        name="chietKhau"
                        id="chietKhau"
                        class="form-control"
                        min="0" max="100" step="0.1"
                        value="0"
                        oninput="tinhLaiTong()"
                />
              </div>
              <div class="col-md-4">
                <label class="form-label fw-bold small">Tổng cộng phiếu nhập (VNĐ)</label>
                <input
                        type="text"
                        id="tongCongPreview"
                        class="form-control fw-bold text-danger"
                        readonly
                        placeholder="Tự động tính..."
                />
              </div>
            </div>
            <div class="alert alert-info py-2 small mb-3">
              <i class="bi bi-info-circle me-1"></i>
              <strong>Tổng cộng</strong> = (Giá bán × Số lượng) + VAT − Chiết khấu
            </div>

            <button
                    type="submit"
                    class="btn btn-primary w-100 fw-bold py-2"
            >
              <span class="fs-5">💾 Lưu Sản Phẩm</span>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    function tinhLaiTong() {
      const gia = parseFloat(document.querySelector('[name="donGiaSP"]').value) || 0;
      const soLuong = parseFloat(document.querySelector('[name="soLuongTon"]').value) || 0;
      const vat = parseFloat(document.getElementById('thueVAT').value) || 0;
      const ck = parseFloat(document.getElementById('chietKhau').value) || 0;

      const tongHang = gia * soLuong;
      const tienVAT = tongHang * vat / 100;
      const tienCK = tongHang * ck / 100;
      const tongCong = tongHang + tienVAT - tienCK;

      document.getElementById('tongCongPreview').value =
              tongCong.toLocaleString('vi-VN') + ' đ';
    }

    // Gắn sự kiện vào ô giá và số lượng để tính real-time
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelector('[name="donGiaSP"]').addEventListener('input', tinhLaiTong);
      document.querySelector('[name="soLuongTon"]').addEventListener('input', tinhLaiTong);
    });

    function toggleNewNCCFields() {
      const checkbox = document.getElementById("isNewNCC");
      const newFieldsDiv = document.getElementById("newNCCFields");
      const selectNCC = document.getElementById("selectNCC");
      const tenNCCMoi = document.getElementById("tenNCCMoi");

      if (checkbox.checked) {
        // Hiện khối điền NCC mới
        newFieldsDiv.style.display = "block";
        tenNCCMoi.required = true;

        // Vô hiệu hóa và bỏ thuộc tính bắt buộc của dropdown NCC cũ
        selectNCC.disabled = true;
        selectNCC.required = false;
      } else {
        // Ẩn khối điền NCC mới
        newFieldsDiv.style.display = "none";
        tenNCCMoi.required = false;
        tenNCCMoi.value = "";

        // Kích hoạt lại dropdown NCC cũ
        selectNCC.disabled = false;
        selectNCC.required = true;
      }
    }

    function toggleProductMode() {
      const isOldSP = document.getElementById("isOldSP").checked;
      const oldSPFields = document.getElementById("oldSPFields");
      const selectOldSP = document.getElementById("selectOldSP");

      const tenSP = document.querySelector('[name="tenSP"]');
      const donVT = document.querySelector('[name="donVT"]');
      const maLoai = document.querySelector('[name="maLoai"]');
      const maNSX = document.querySelector('[name="maNSX"]');
      const selectNCC = document.getElementById("selectNCC");
      const isNewNCC = document.getElementById("isNewNCC");

      const cpu = document.querySelector('[name="cpu"]');
      const ram = document.querySelector('[name="ram"]');
      const rom = document.querySelector('[name="rom"]');
      const vga = document.querySelector('[name="vga"]');
      const manHinh = document.querySelector('[name="manHinh"]');
      const khac = document.querySelector('[name="khac"]');

      if (isOldSP) {
        oldSPFields.style.display = "block";
        selectOldSP.required = true;

        // Khóa các trường thông tin cơ bản không cho sửa
        tenSP.readOnly = true;
        donVT.readOnly = true;
        maLoai.disabled = true;
        maNSX.disabled = true;
        selectNCC.disabled = true;
        isNewNCC.disabled = true;

        // Khóa luôn phần nhập mô tả cấu hình chi tiết
        if(cpu) cpu.readOnly = true;
        if(ram) ram.readOnly = true;
        if(rom) rom.readOnly = true;
        if(vga) vga.readOnly = true;
        if(manHinh) manHinh.readOnly = true;
        if(khac) khac.readOnly = true;
      } else {
        document.getElementById("oldImagePreview").style.display = "none";
        document.getElementById("imgPreview").src = "";
        oldSPFields.style.display = "none";
        selectOldSP.required = false;
        selectOldSP.value = "";

        // Mở khóa lại toàn bộ form để nhập sản phẩm mới
        tenSP.readOnly = false; tenSP.value = "";
        donVT.readOnly = false; donVT.value = "";
        maLoai.disabled = false; maLoai.value = "";
        maNSX.disabled = false; maNSX.value = "";
        selectNCC.disabled = false; selectNCC.value = "";
        isNewNCC.disabled = false;

        if(cpu) { cpu.readOnly = false; cpu.value = ""; }
        if(ram) { ram.readOnly = false; ram.value = ""; }
        if(rom) { rom.readOnly = false; rom.value = ""; }
        if(vga) { vga.readOnly = false; vga.value = ""; }
        if(manHinh) { manHinh.readOnly = false; manHinh.value = ""; }
        if(khac) { khac.readOnly = false; khac.value = ""; }

        document.querySelector('[name="donGiaSP"]').value = "";
        document.querySelector('[name="soLuongTon"]').value = "";
        tinhLaiTong();
      }
    }

    function fillProductDetails() {
      const select = document.getElementById("selectOldSP");
      const selectedOption = select.options[select.selectedIndex];

      if (!selectedOption.value) return;

      // Đổ thông tin cơ bản
      document.querySelector('[name="tenSP"]').value = selectedOption.getAttribute('data-ten');
      document.querySelector('[name="donVT"]').value = selectedOption.getAttribute('data-donvi');
      document.querySelector('[name="donGiaSP"]').value = selectedOption.getAttribute('data-gia');
      document.querySelector('[name="maLoai"]').value = selectedOption.getAttribute('data-loai');
      document.querySelector('[name="maNSX"]').value = selectedOption.getAttribute('data-nsx');
      document.getElementById("selectNCC").value = selectedOption.getAttribute('data-ncc');

      // Đổ thông tin mô tả chi tiết phần cứng cố định
      const cpu = document.querySelector('[name="cpu"]');
      const ram = document.querySelector('[name="ram"]');
      const rom = document.querySelector('[name="rom"]');
      const vga = document.querySelector('[name="vga"]');
      const manHinh = document.querySelector('[name="manHinh"]');
      const khac = document.querySelector('[name="khac"]');

      if(cpu) cpu.value = selectedOption.getAttribute('data-cpu') || "";
      if(ram) ram.value = selectedOption.getAttribute('data-ram') || "";
      if(rom) rom.value = selectedOption.getAttribute('data-rom') || "";
      if(vga) vga.value = selectedOption.getAttribute('data-vga') || "";
      if(manHinh) manHinh.value = selectedOption.getAttribute('data-manhinh') || "";
      if(khac) khac.value = selectedOption.getAttribute('data-khac') || "";

      tinhLaiTong();
      const tenAnh = selectedOption.getAttribute('data-anh');
      if (tenAnh) {
        // Ghép với đường dẫn thư mục chứa ảnh tĩnh của bạn (ví dụ /Content/HinhAnhPhongVu/)
        document.getElementById("imgPreview").src = "/Content/HinhAnhPhongVu/" + tenAnh;
        document.getElementById("oldImagePreview").style.display = "block";
      } else {
        document.getElementById("oldImagePreview").style.display = "none";
      }
    }
  </script>
</div> </body>
</html>
