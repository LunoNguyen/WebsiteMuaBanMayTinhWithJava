<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{shared/_LayoutAdmin :: layout(~{::div.container-fluid})}">

<body>
  <div class="container-fluid px-4">
    <h1 class="mt-4">Quản lý Sản phẩm</h1>
    <ol class="breadcrumb mb-4">
      <li class="breadcrumb-item">
        <a th:href="@{/admin/trang-admin}">Tổng quan</a>
      </li>
      <li class="breadcrumb-item active">Danh sách Sản phẩm</li>
    </ol>
    <div th:if="${Success}" class="alert alert-success alert-dismissible fade show">
      <span th:text="${Success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${Error}" class="alert alert-danger alert-dismissible fade show">
      <span th:text="${Error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card mb-4 shadow-sm">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span class="fw-bold">Danh sách Sản phẩm</span>
        <a th:href="@{/admin/create-sp}" class="btn btn-primary btn-sm">Thêm mới</a>
      </div>
      <div class="card-body">
        <div class="row g-2 mb-3">
          <div class="col-lg-4 col-md-6">
            <input
              type="search"
              id="spSearch"
              class="form-control"
              placeholder="Tim theo ma hoac ten san pham"
            />
          </div>
          <div class="col-lg-2 col-md-6">
            <select id="spStatus" class="form-select">
              <option value="">Tat ca trang thai</option>
              <option value="in-stock">Con hang</option>
              <option value="out-stock">Het hang</option>
            </select>
          </div>
          <div class="col-lg-2 col-md-6">
            <input type="number" id="spMinPrice" class="form-control" min="0" placeholder="Gia tu" />
          </div>
          <div class="col-lg-2 col-md-6">
            <input type="number" id="spMaxPrice" class="form-control" min="0" placeholder="Gia den" />
          </div>
          <div class="col-lg-1 col-md-6">
            <input type="number" id="spMinStock" class="form-control" min="0" placeholder="Ton tu" />
          </div>
          <div class="col-lg-1 col-md-6">
            <input type="number" id="spMaxStock" class="form-control" min="0" placeholder="Ton den" />
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-bordered table-striped table-hover align-middle">
            <thead class="table-dark text-center">
              <tr>
                <th>Mã SP</th>
                <th>Tên sản phẩm</th>
                <th>Giá bán</th>
                <th>Tồn kho</th>
                <th>Trạng thái</th>
                <th style="width: 250px">Hành động</th>
              </tr>
            </thead>
            <tbody id="spTableBody">
              <tr
                th:each="item : ${QLSP}"
                th:data-search="${item.maSP + ' ' + item.tenSP}"
                th:data-price="${item.donGiaSP != null ? item.donGiaSP : 0}"
                th:data-stock="${item.soLuongTon != null ? item.soLuongTon : 0}"
                th:data-status="${item.soLuongTon > 0 ? 'in-stock' : 'out-stock'}"
              >
                <td class="text-center" th:text="${item.maSP}"></td>
                <td class="fw-bold text-primary" th:text="${item.tenSP}"></td>
                <td class="text-end fw-bold"
                  th:text="${#numbers.formatDecimal(item.donGiaSP, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                <td class="text-center" th:text="${item.soLuongTon}"></td>
                <td class="text-center">
                  <span th:if="${item.soLuongTon > 0}" class="badge bg-success">Còn hàng</span>
                  <span th:unless="${item.soLuongTon > 0}" class="badge bg-danger">Hết hàng</span>
                </td>
                <td class="text-center">
                  <div class="btn-group" role="group">
                    <a th:href="@{/admin/details-sp/{id}(id=${item.maSP})}" class="btn btn-info btn-sm text-white"
                      title="Chi tiết">
                      Chi tiết
                    </a>

                    <a th:href="@{/admin/edit-sp/{id}(id=${item.maSP})}" class="btn btn-warning btn-sm ms-1"
                      title="Sửa">
                      Sửa
                    </a>

                    <a th:href="@{/admin/delete-sp/{id}(id=${item.maSP})}" class="btn btn-danger btn-sm ms-1"
                      title="Xóa">
                      Xóa
                    </a>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <script>
      (() => {
        const search = document.getElementById("spSearch");
        const status = document.getElementById("spStatus");
        const minPrice = document.getElementById("spMinPrice");
        const maxPrice = document.getElementById("spMaxPrice");
        const minStock = document.getElementById("spMinStock");
        const maxStock = document.getElementById("spMaxStock");
        const rows = Array.from(document.querySelectorAll("#spTableBody tr"));

        const normalize = (value) => (value || "").toString().toLowerCase();
        const numberOrNull = (value) => value === "" ? null : Number(value);
        const inRange = (value, min, max) =>
          (min === null || value >= min) && (max === null || value <= max);

        const filterRows = () => {
          const keyword = normalize(search.value);
          const selectedStatus = status.value;
          const priceMin = numberOrNull(minPrice.value);
          const priceMax = numberOrNull(maxPrice.value);
          const stockMin = numberOrNull(minStock.value);
          const stockMax = numberOrNull(maxStock.value);

          rows.forEach((row) => {
            const price = Number(row.dataset.price || 0);
            const stock = Number(row.dataset.stock || 0);
            const visible =
              normalize(row.dataset.search).includes(keyword) &&
              (!selectedStatus || row.dataset.status === selectedStatus) &&
              inRange(price, priceMin, priceMax) &&
              inRange(stock, stockMin, stockMax);

            row.style.display = visible ? "" : "none";
          });
        };

        [search, status, minPrice, maxPrice, minStock, maxStock].forEach((item) => {
          item.addEventListener("input", filterRows);
          item.addEventListener("change", filterRows);
        });
      })();
    </script>
  </div>
</body>

</html>
