<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{shared/_LayoutTrangChu :: layout(~{::body})}"
>
  <head>
    <title>Trang Chủ</title>
  </head>

  <body>
    <style>
      .home-banner {
        width: 100%;
        height: 260px;
        object-fit: cover;
        border-radius: 12px;
        display: block;
      }

      .home-section {
        background-color: #ffffff;
        border-radius: 14px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      }

      .filter-btn {
        border-radius: 999px;
        padding: 10px 26px;
        font-weight: 600;
        transition: all 0.2s ease;
      }

      .filter-btn:hover {
        background-color: #3456c4;
        color: #ffffff !important;
        border-color: #3456c4;
        transform: translateY(-2px);
      }

      .product-wrapper {
        margin-top: 36px;
      }

      .product-card {
        width: 100%;
        height: 370px;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid #e5e7eb;
        background-color: #ffffff;
        transition: all 0.25s ease;
      }

      .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
        border-color: #3456c4;
      }

      .product-img-box {
        width: 100%;
        height: 185px;
        background-color: #ffffff;
        padding: 14px;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        border-bottom: 1px solid #f0f0f0;
      }

      .product-img {
        width: 100% !important;
        height: 100% !important;
        object-fit: contain !important;
        display: block;
      }

      .product-body {
        height: 185px;
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .product-price {
        color: #dc3545;
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .product-name {
        color: #212529;
        font-size: 15px;
        line-height: 1.4;
        margin-bottom: 6px;

        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        min-height: 42px;
      }

      .product-code {
        font-size: 13px;
        color: #6c757d;
      }

      .product-detail-btn {
        height: 40px;
        border-radius: 9px;
        font-weight: 600;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: all 0.2s ease;
      }

      .product-detail-btn:hover {
        background-color: #3456c4;
        color: #ffffff !important;
        border-color: #3456c4 !important;
      }

      .empty-product-box {
        min-height: 180px;
        border: 1px dashed #cbd5e1;
        border-radius: 14px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #64748b;
        background-color: #ffffff;
        font-weight: 600;
      }

      .pagination-wrapper {
        margin: 34px 0 48px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .pagination-info {
        font-size: 14px;
        color: #64748b;
        margin-bottom: 4px;
      }

      .google-pagination {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
      }

      .google-pages {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .google-page-number,
      .google-page-nav {
        text-decoration: none;
        font-weight: 600;
        color: #1a73e8;
        min-width: 28px;
        height: 34px;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        border-radius: 8px;
        transition: all 0.2s ease;
      }

      .google-page-number:hover,
      .google-page-nav:hover {
        background-color: #e8f0fe;
        color: #0b57d0;
      }

      .google-page-number.active {
        background-color: #3456c4;
        color: #ffffff;
        pointer-events: none;
      }

      .google-page-nav.disabled {
        color: #94a3b8;
        pointer-events: none;
        cursor: not-allowed;
      }

      @media (max-width: 768px) {
        .home-banner {
          height: 170px;
        }

        .product-card {
          height: 345px;
        }

        .product-img-box {
          height: 165px;
        }

        .product-body {
          height: 180px;
        }

        .product-price {
          font-size: 17px;
        }

        .google-pagination {
          gap: 8px;
        }

        .google-pages {
          gap: 6px;
        }
      }
    </style>

    <div class="container mt-3">
      <img
        th:src="@{/Content/HinhAnhPhongVu/chude_01.png}"
        class="home-banner"
        alt="Banner"
      />
    </div>

    <div class="container my-4 p-4 home-section">
      <div class="row">
        <div class="col-12 mb-4">
          <h5 class="fw-bold mb-3" style="color: #3456c4">
            <i class="bi bi-star-fill text-warning me-2"></i>
            THƯƠNG HIỆU NỔI BẬT
          </h5>

          <div class="d-flex flex-wrap gap-2">
            <a
              th:each="nsx : ${dsnsx}"
              th:href="@{'/tim-kiem/nsx/' + ${nsx.maNSX}}"
              class="btn btn-outline-secondary filter-btn"
              th:text="${nsx.tenNSX}"
            >
              Tên thương hiệu
            </a>
          </div>
        </div>

        <div class="col-12">
          <h5 class="fw-bold mb-3" style="color: #3456c4">
            <i class="bi bi-laptop me-2"></i>
            DANH MỤC SẢN PHẨM
          </h5>

          <div class="d-flex flex-wrap gap-2">
            <a
              th:each="lsp : ${dslsp}"
              th:href="@{'/tim-kiem/loai/' + ${lsp.maLoai}}"
              class="btn btn-outline-primary filter-btn"
              th:text="${lsp.tenLoai}"
            >
              Tên loại
            </a>
          </div>
        </div>
      </div>
    </div>

    <div class="container product-wrapper">
      <div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-4" th:if="${dssp != null and !dssp.isEmpty()}">
        <div th:each="item : ${dssp}" class="col d-flex">
          <div class="card product-card">
            <div class="product-img-box">
              <img
                th:src="@{/Content/HinhAnhPhongVu/{file}(file=${(item.danhSachAnhs != null and !item.danhSachAnhs.isEmpty()) ? item.danhSachAnhs[0].tenAnh : 'no-image.jpg'})}"
                class="product-img"
                alt="Ảnh sản phẩm"
              />
            </div>

            <div class="card-body product-body">
              <div>
                <h5
                  class="product-price"
                  th:text="${#numbers.formatDecimal(item.donGiaSP, 0, 'COMMA', 0, 'POINT')} + ' đ'"
                >
                  0 đ
                </h5>

                <p class="product-name" th:text="${item.tenSP}">
                  Tên sản phẩm
                </p>

                <div class="product-code" th:text="'Mã SP: ' + ${item.maSP}">
                  Mã SP
                </div>
              </div>

              <a
                th:href="@{'/chi-tiet-san-pham/' + ${item.maSP}}"
                class="btn border border-dark text-dark w-100 product-detail-btn"
              >
                XEM CHI TIẾT
              </a>
            </div>
          </div>
        </div>
      </div>

      <div class="empty-product-box" th:if="${dssp == null or dssp.isEmpty()}">
        Không có sản phẩm nào để hiển thị.
      </div>

      <div class="pagination-wrapper" th:if="${totalPages != null and totalPages > 1}">
        <div class="pagination-info">
          Đang hiển thị
          <span th:text="${#lists.size(dssp)}">15</span>
          / 
          <span th:text="${totalItems}">0</span>
          sản phẩm
        </div>

        <nav class="google-pagination" aria-label="Phân trang sản phẩm">
          <a
            class="google-page-nav"
            th:classappend="${currentPage == 1} ? ' disabled'"
            th:href="@{/(page=${currentPage > 1 ? currentPage - 1 : 1})}"
          >
            Trước
          </a>

          <div class="google-pages">
            <a
              th:each="i : ${#numbers.sequence(startPage, endPage)}"
              class="google-page-number"
              th:classappend="${i == currentPage} ? ' active'"
              th:href="@{/(page=${i})}"
              th:text="${i}"
            >
              1
            </a>
          </div>

          <a
            class="google-page-nav"
            th:classappend="${currentPage == totalPages} ? ' disabled'"
            th:href="@{/(page=${currentPage < totalPages ? currentPage + 1 : totalPages})}"
          >
            Tiếp
          </a>
        </nav>
      </div>
    </div>
  </body>
</html>
