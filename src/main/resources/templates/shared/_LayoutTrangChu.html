<!doctype html>
<html th:fragment="layout(Content)" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Phong Vũ Computer - Mua bán máy tính</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f4f6f8;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .top-bar {
        background-color: #3456c4;
        color: white;
        font-size: 13px;
      }
      .top-bar a {
        color: white;
        text-decoration: none;
      }
      .top-bar a:hover {
        opacity: 0.8;
      }

      .header-main {
        background-color: #ffffff;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      }

      .search-box {
        border: 2px solid #3456c4;
        border-radius: 6px;
        overflow: hidden;
      }
      .search-box input {
        border: none;
        box-shadow: none !important;
      }
      .search-box button {
        background-color: #3456c4;
        color: white;
        border: none;
      }
      .search-box button:hover {
        background-color: #274092;
        color: white;
      }

      .cart-icon {
        font-size: 1.8rem;
        color: #3456c4;
        transition: 0.2s;
      }
      .cart-icon:hover {
        color: #d70018;
      }
    </style>
  </head>
  <body>
    <div class="top-bar py-1">
      <div class="container d-flex justify-content-start gap-4">
        <span
          ><i class="bi bi-shop me-1"></i>
          <a href="#">Hệ thống showroom</a></span
        >
        <span
          ><i class="bi bi-telephone-fill me-1"></i>
          <a href="#">Hotline: 18006867</a></span
        >
      </div>
    </div>

    <div class="header-main sticky-top py-3 mb-4">
      <div class="container d-flex align-items-center justify-content-between">
        <a th:href="@{/trang-chu}" class="text-decoration-none me-4">
          <img
            th:src="@{/Content/HinhAnhPhongVu/logo_PhongVu.png}"
            alt="Phong Vũ Logo"
            style="height: 55px; object-fit: contain"
          />
        </a>

        <div class="flex-grow-1 mx-lg-5">
          <form method="post" th:action="@{/tim-kiem}">
            <div class="input-group search-box">
              <input
                class="form-control px-3 py-2"
                name="txtTuKhoa"
                type="search"
                placeholder="Nhập tên sản phẩm, từ khóa cần tìm..."
                required
              />
              <button class="btn px-4" type="submit">
                <i class="bi bi-search fw-bold"></i>
              </button>
            </div>
          </form>
        </div>

        <div class="d-flex align-items-center gap-4">
          <div th:if="${session.AccountType != null}" class="dropdown">
            <button
              class="btn btn-light dropdown-toggle border-0 py-2 fw-bold"
              type="button"
              data-bs-toggle="dropdown"
              style="color: #3456c4"
            >
              <i class="bi bi-person-circle fs-5 me-1 align-middle"></i>
              <span th:text="${session.UserName}"></span>
            </button>
            <ul class="dropdown-menu shadow border-0 mt-2">
              <li>
                <a
                  class="dropdown-item py-2"
                  th:href="@{/tai-khoan/thong-tin-tai-khoan}"
                  ><i class="bi bi-person me-2"></i> Hồ sơ cá nhân</a
                >
              </li>
              <li>
                <a
                  class="dropdown-item py-2"
                  th:href="@{/tai-khoan/lich-su-don-hang}"
                  ><i class="bi bi-clock-history me-2"></i> Lịch sử mua hàng</a
                >
              </li>
              <li><hr class="dropdown-divider" /></li>
              <li>
                <a
                  class="dropdown-item text-danger py-2"
                  th:href="@{/tai-khoan/dang-xuat}"
                  ><i class="bi bi-box-arrow-right me-2"></i> Đăng xuất</a
                >
              </li>
            </ul>
          </div>

          <div th:unless="${session.AccountType != null}">
            <a
              th:href="@{/tai-khoan/dang-nhap}"
              class="btn btn-outline-primary rounded-pill px-4 fw-bold"
            >
              <i class="bi bi-person-fill me-1"></i> Đăng nhập
            </a>
          </div>

          <div
            th:with="tongSoLuong=${session.GioHang != null and !session.GioHang.isEmpty() ? #aggregates.sum(session.GioHang.![iSoLuong]) : 0}"
          >
            <a
              th:href="@{/gio-hang/}"
              class="position-relative d-inline-block text-decoration-none mt-1 me-2"
            >
              <i class="bi bi-cart3 cart-icon"></i>
              <span
                th:if="${tongSoLuong > 0}"
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger shadow-sm"
              >
                <span th:text="${tongSoLuong}"></span>
              </span>
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- NỘI DUNG CHÍNH -->
    <div class="container mb-5">
      <div class="row gx-4">
        <div class="col-12">
          <div th:replace="${Content}"></div>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="bg-white border-top py-4 mt-auto">
      <div class="container text-dark text-center">
        <h5 style="color: #3456c4" class="fw-bold">
          <i class="bi bi-shield-check me-2"></i>PHONG VŨ COMPUTER
        </h5>
        <p class="mb-0 small text-muted">Chất lượng - Uy tín - Tận tâm</p>
        <p class="mt-2 small">
          <a href="#" class="text-decoration-none text-muted"
            >Hướng dẫn mua hàng</a
          >
          |
          <a href="#" class="text-decoration-none text-muted"
            >Chính sách bảo hành</a
          >
        </p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
