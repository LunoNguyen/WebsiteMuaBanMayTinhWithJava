<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{shared/_LayoutTrangChu :: layout(~{::body})}"
>
  <head>
    <title>Giỏ hàng của bạn</title>
  </head>
  <body>
    <div th:if="${thongBao != null}" class="alert alert-warning alert-dismissible fade show mx-auto mt-3" style="max-width: 1100px;" role="alert">
      <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="${thongBao}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${error != null}" class="alert alert-danger alert-dismissible fade show mx-auto mt-3" style="max-width: 1100px;" role="alert">
      <i class="fas fa-times-circle me-2"></i> <span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${Success != null}" class="alert alert-success alert-dismissible fade show mx-auto mt-3" style="max-width: 1100px;" role="alert">
      <i class="fas fa-check-circle me-2"></i> <span th:text="${Success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="container mt-5 mb-5" style="max-width: 1100px;">
      <h2 class="text-center text-primary mb-4 fw-bold">GIỎ HÀNG CỦA BẠN</h2>

      <div th:if="${lstGioHang == null or lstGioHang.isEmpty()}" class="alert alert-info text-center p-5 shadow-sm rounded-3">
        <i class="fas fa-shopping-cart fa-2x mb-3 text-secondary d-block"></i>
        Giỏ hàng của bạn đang trống. 
        <a th:href="@{/trang-chu}" class="fw-bold text-decoration-none text-primary ms-1">Mua sắm ngay!</a>
      </div>

      <div th:unless="${lstGioHang == null or lstGioHang.isEmpty()}">
        <div class="table-responsive card shadow-sm border-0 rounded-3 p-2 bg-white">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light text-secondary">
              <tr>
                <th class="ps-3">Hình ảnh</th>
                <th>Tên sản phẩm</th>
                <th class="text-end">Đơn giá</th>
                <th class="text-center" style="width: 140px;">Số lượng</th>
                <th class="text-end">Thành tiền</th>
                <th class="text-center">Thao tác</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="item : ${lstGioHang}">
                <td class="ps-3">
                  <img th:src="@{'/Content/HinhAnhPhongVu/' + ${item.sAnhBia}}" 
                       class="img-fluid rounded border p-1" 
                       style="width: 70px; height: 70px; object-fit: contain;" alt="Ảnh sản phẩm"/>
                </td>
                <td>
                  <a th:href="@{'/chi-tiet-san-pham/' + ${item.iMaSP}}" class="text-dark fw-bold text-decoration-none text-primary-hover" th:text="${item.sTenSP}"></a>
                  <div class="text-muted small mt-1" th:text="'Mã sản phẩm: ' + ${item.iMaSP}"></div>
                </td>
                <td class="text-end fw-semibold text-secondary" th:text="${#numbers.formatDecimal(item.dDonGia, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                
                <td class="text-center">
                  <form th:action="@{/gio-hang/cap-nhat}" method="post" class="m-0 d-flex align-items-center justify-content-center gap-1">
                    <input type="hidden" name="iMaSP" th:value="${item.iMaSP}"/>
                    
                    <input type="number" name="txtSoLuong" th:value="${item.iSoLuong}" min="1" 
                          th:max="${mapTonKho[item.iMaSP]}" 
                          class="form-control form-control-sm text-center fw-bold border-secondary" 
                          style="width: 65px; border-radius: 6px;"/>
                          
                    <button type="submit" class="btn btn-sm btn-primary px-2" style="border-radius: 6px;" title="Lưu thay đổi">
                      <i class="fas fa-save"></i> Lưu
                    </button>
                  </form>
                </td>
                
                <td class="text-end text-primary fw-bold" th:text="${#numbers.formatDecimal(item.dThanhTien, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                <td class="text-center">
                  <a th:href="@{'/gio-hang/xoa?iMaSP=' + ${item.iMaSP}}" onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này?');" class="btn btn-sm btn-outline-danger px-3" style="border-radius: 6px;">
                    <i class="fas fa-trash-alt me-1"></i> Xóa
                  </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="card shadow-sm border-0 mt-4 rounded-3 bg-white">
          <div class="card-body p-4">

            <div th:if="${ThongBaoKhuyenMai != null}" class="alert alert-warning mb-3" role="alert">
              <i class="fas fa-info-circle me-2"></i>
              <span th:text="${ThongBaoKhuyenMai}"></span>
            </div>

            <div class="row g-3 align-items-end mb-4 pb-3 border-bottom">
              <div class="col-md-7">
                <label for="maKhuyenMai" class="form-label fw-bold text-dark mb-2">
                  <i class="fas fa-tags text-primary me-1"></i> Mã khuyến mãi
                </label>
                <form th:action="@{/gio-hang/ap-dung-khuyen-mai}" method="post" class="d-flex gap-2">
                  <input
                    type="text"
                    id="maKhuyenMai"
                    name="maKhuyenMai"
                    class="form-control fw-semibold text-uppercase"
                    th:value="${MaKhuyenMai}"
                    placeholder="Nhập mã khuyến mãi"
                    style="border-radius: 8px;"
                  />
                  <button type="submit" class="btn btn-primary px-4 fw-semibold" style="border-radius: 8px;">
                    Áp dụng
                  </button>
                </form>
                <div th:if="${MaKhuyenMai != null}" class="small text-success fw-semibold mt-2">
                  Đang áp dụng:
                  <span th:text="${MaKhuyenMai}"></span>
                  <span th:if="${TenKhuyenMai != null}" th:text="' - ' + ${TenKhuyenMai}"></span>
                  <form th:action="@{/gio-hang/huy-khuyen-mai}" method="post" class="d-inline ms-2">
                    <button type="submit" class="btn btn-link btn-sm text-danger p-0 align-baseline">
                      Hủy mã
                    </button>
                  </form>
                </div>
              </div>
              <div class="col-md-5">
                <div class="d-flex justify-content-between mb-2">
                  <span class="text-secondary fw-semibold">Tạm tính:</span>
                  <span class="fw-semibold" th:text="${#numbers.formatDecimal(TongTien, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                </div>
                <div class="d-flex justify-content-between mb-2" th:if="${TienGiam != null and TienGiam > 0}">
                  <span class="text-secondary fw-semibold">Khuyến mãi:</span>
                  <span class="text-success fw-bold" th:text="'- ' + ${#numbers.formatDecimal(TienGiam, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                </div>
                <div class="d-flex justify-content-between align-items-center pt-2 border-top">
                  <span class="text-secondary fw-semibold fs-5">Tổng tiền thanh toán:</span>
                  <span class="text-danger fw-bold h2 mb-0" th:text="${#numbers.formatDecimal(TongTienSauGiam, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                </div>
              </div>
            </div>

            <form th:action="@{/gio-hang/dat-hang}" method="get" class="w-100 m-0">

              <div class="d-flex align-items-center gap-2 mb-3 justify-content-md-end">
                <i class="fas fa-credit-card text-primary fs-5"></i>
                <span class="fw-bold text-dark" style="font-size: 15px;">Chọn hình thức thanh toán:</span>
              </div>

              <div class="d-flex gap-3 flex-wrap justify-content-md-end mb-4">
                
                <input type="radio" class="btn-check" name="phuongThucTT" id="payCOD" value="COD" checked>
                <label class="btn btn-outline-primary p-3 text-start d-flex flex-column justify-content-center" for="payCOD" style="min-width: 250px; border-radius: 10px; border-width: 2px;">
                  <span class="fw-bold fs-6">COD</span>
                  <span class="small opacity-75 mt-1">Thanh toán khi nhận hàng</span>
                </label>

                <input type="radio" class="btn-check" name="phuongThucTT" id="payQR" value="QR">
                <label class="btn btn-outline-primary p-3 text-start d-flex flex-column justify-content-center" for="payQR" style="min-width: 250px; border-radius: 10px; border-width: 2px;">
                  <span class="fw-bold fs-6">Chuyển khoản QR</span>
                  <span class="small opacity-75 mt-1">Quét mã duyệt đơn tự động</span>
                </label>

                <input type="radio" class="btn-check" name="phuongThucTT" id="payCASH" value="CASH">
                <label class="btn btn-outline-primary p-3 text-start d-flex flex-column justify-content-center" for="payCASH" style="min-width: 250px; border-radius: 10px; border-width: 2px;">
                  <span class="fw-bold fs-6">Tiền mặt tại quầy</span>
                  <span class="small opacity-75 mt-1">Thanh toán tại cửa hàng</span>
                </label>

              </div>

              <div class="row align-items-center g-3 pt-3 border-top">
                <div class="col-md-4 text-start">
                  <a th:href="@{/trang-chu}" class="btn btn-outline-secondary px-4 py-2 fw-semibold" style="border-radius: 8px;">
                    <i class="fas fa-arrow-left me-2"></i>Tiếp tục mua hàng
                  </a>
                </div>
                <div class="col-md-8 text-end">
                  <button type="submit" class="btn btn-primary btn-lg px-5 fw-bold shadow" 
                          style="background-color: #3456c4; border-color: #3456c4; border-radius: 8px; font-size: 16px;">
                    <i class="fas fa-shopping-bag me-2"></i>ĐẶT HÀNG NGAY
                  </button>
                </div>
              </div>

            </form>
            
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
