<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{shared/_LayoutTrangChu :: layout(~{::body})}"
>
  <head>
    <title>Thông Tin Tài Khoản</title>
  </head>
  <body>
    <div class="container py-5">
      <h2 class="text-primary mb-4" style="text-align: center">
        THÔNG TIN TÀI KHOẢN
      </h2>

      <form
        th:action="@{/tai-khoan/thong-tin-tai-khoan}"
        th:object="${khachHang}"
        method="post"
      >
        <div class="form-horizontal col-md-8 mx-auto">
          <hr />
          <input type="hidden" th:field="*{maKH}" />

          <div class="form-group mb-3">
            <label>Tên khách hàng</label>
            <input type="text" th:field="*{tenKH}" class="form-control" />
          </div>

          <div class="form-group mb-3">
            <label>Số điện thoại khách hàng</label>
            <input type="text" th:field="*{sdtKH}" class="form-control" />
          </div>

          <div class="form-group mb-3">
            <label>Địa chỉ nhận hàng</label>
            <input type="text" th:field="*{diaChiKH}" class="form-control" />
          </div>

          <div class="form-group mb-3">
            <label>Email nhận hàng</label>
            <input
              type="email"
              th:field="*{emailKH}"
              class="form-control"
              readonly
            />
          </div>

          <div class="form-group mt-4">
            <button type="submit" class="btn btn-primary px-4">Cập nhật</button>
            <a th:href="@{/trang-chu}" class="btn btn-secondary ms-2"
              >Trở lại trang chủ</a
            >
          </div>
        </div>
      </form>
    </div>
  </body>
</html>
