<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{shared/_LayoutAdmin :: layout(~{::div.container-fluid})}"
>
  <body>
    <div class="container-fluid px-4">
      <h1 class="mt-4">Quản lý Đơn hàng</h1>
      <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item">
          <a th:href="@{/admin/trang-admin}">Tổng quan</a>
        </li>
        <li class="breadcrumb-item active">Quản lý Đơn hàng</li>
      </ol>

      <div class="card mb-4 shadow-sm">
        <div class="card-header fw-bold">Danh sách Đơn hàng</div>
        <div class="card-body">
          <div class="row g-2 mb-3">
            <div class="col-lg-3 col-md-6">
              <input
                type="search"
                id="dhSearch"
                class="form-control"
                placeholder="Tim theo ma don hoac khach hang"
              />
            </div>
            <div class="col-lg-2 col-md-6">
              <select id="dhStatus" class="form-select">
                <option value="">Tat ca trang thai</option>
                <option value="ÄÃ£ Ä‘áº·t">Da dat</option>
                <option value="Äang giao">Dang giao</option>
                <option value="ÄÃ£ thanh toÃ¡n">Da thanh toan</option>
                <option value="ÄÃ£ há»§y">Da huy</option>
              </select>
            </div>
            <div class="col-lg-2 col-md-6">
              <input type="date" id="dhFromDate" class="form-control" />
            </div>
            <div class="col-lg-2 col-md-6">
              <input type="date" id="dhToDate" class="form-control" />
            </div>
            <div class="col-lg-1 col-md-6">
              <input type="number" id="dhMinTotal" class="form-control" min="0" placeholder="Tu" />
            </div>
            <div class="col-lg-2 col-md-6">
              <input type="number" id="dhMaxTotal" class="form-control" min="0" placeholder="Tong tien den" />
            </div>
          </div>
          <div class="table-responsive">
            <table class="table table-striped table-bordered align-middle">
              <thead class="table-dark text-center">
                <tr>
                  <th>Mã ĐH</th>
                  <th>Khách hàng</th>
                  <th>Ngày lập</th>
                  <th class="text-end">Tổng tiền</th>
                  <th style="min-width: 280px">Trạng thái & Cập nhật</th>
                  <th>Chi tiết</th>
                </tr>
              </thead>
              <tbody id="dhTableBody">
                <tr
                  th:each="item : ${listDH}"
                  th:data-search="${item.maHD + ' ' + (item.khachHang != null ? item.khachHang.tenKH : 'Khach vang lai')}"
                  th:data-status="${item.trangThaiTT}"
                  th:data-date="${#temporals.format(item.ngayLap, 'yyyy-MM-dd')}"
                  th:data-total="${item.tongTienHD != null ? item.tongTienHD : 0}"
                >
                  <td class="fw-bold text-center">
                    <a
                      th:href="@{/admin/chitiet-donhang/{id}(id=${item.maHD})}"
                      class="text-decoration-none"
                      th:text="${item.maHD}"
                    ></a>
                  </td>
                  <td
                    th:text="${item.khachHang != null ? item.khachHang.tenKH : 'Khách vãng lai'}"
                  ></td>
                  <td
                    class="text-center"
                    th:text="${#temporals.format(item.ngayLap, 'dd/MM/yyyy')}"
                  ></td>
                  <td
                    class="text-end fw-bold text-success"
                    th:text="${#numbers.formatDecimal(item.tongTienHD, 0, 'COMMA', 0, 'POINT')} + ' đ'"
                  ></td>

                  <td class="text-center">
                    <th:block
                      th:if="${item.trangThaiTT == 'Đã hủy' or item.trangThaiTT == 'Đã thanh toán'}"
                    >
                      <span
                        th:class="'badge fs-6 ' + (${item.trangThaiTT == 'Đã hủy'} ? 'bg-danger' : 'bg-success')"
                        th:text="${item.trangThaiTT}"
                      ></span>
                    </th:block>

                    <th:block
                      th:unless="${item.trangThaiTT == 'Đã hủy' or item.trangThaiTT == 'Đã thanh toán'}"
                    >
                      <form
                        th:action="@{/admin/capnhat-trangthai}"
                        method="post"
                        class="d-flex justify-content-center"
                      >
                        <input
                          type="hidden"
                          name="maDonHang"
                          th:value="${item.maHD}"
                        />
                        <div class="input-group input-group-sm">
                          <select
                            name="newStatus"
                            class="form-select fw-bold"
                            style="width: 140px"
                          >
                            <option
                              th:each="st : ${ {'Đã đặt', 'Đang giao', 'Đã thanh toán', 'Đã hủy'} }"
                              th:value="${st}"
                              th:text="${st}"
                              th:selected="${item.trangThaiTT == st}"
                            ></option>
                          </select>
                          <button
                            type="submit"
                            class="btn btn-warning text-dark fw-bold"
                            title="Lưu trạng thái mới"
                          >
                            Lưu
                          </button>
                        </div>
                      </form>
                    </th:block>
                  </td>

                  <td class="text-center">
                    <a
                      th:href="@{/admin/chitiet-donhang/{id}(id=${item.maHD})}"
                      class="btn btn-info btn-sm text-white"
                      >Xem</a
                    >
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <script>
        (() => {
          const search = document.getElementById("dhSearch");
          const status = document.getElementById("dhStatus");
          const fromDate = document.getElementById("dhFromDate");
          const toDate = document.getElementById("dhToDate");
          const minTotal = document.getElementById("dhMinTotal");
          const maxTotal = document.getElementById("dhMaxTotal");
          const rows = Array.from(document.querySelectorAll("#dhTableBody tr"));

          const normalize = (value) => (value || "").toString().toLowerCase();
          const numberOrNull = (value) => value === "" ? null : Number(value);
          const inRange = (value, min, max) =>
            (min === null || value >= min) && (max === null || value <= max);

          const filterRows = () => {
            const keyword = normalize(search.value);
            const selectedStatus = status.value;
            const start = fromDate.value;
            const end = toDate.value;
            const totalMin = numberOrNull(minTotal.value);
            const totalMax = numberOrNull(maxTotal.value);

            rows.forEach((row) => {
              const rowDate = row.dataset.date || "";
              const total = Number(row.dataset.total || 0);
              const visible =
                normalize(row.dataset.search).includes(keyword) &&
                (!selectedStatus || row.dataset.status === selectedStatus) &&
                (!start || rowDate >= start) &&
                (!end || rowDate <= end) &&
                inRange(total, totalMin, totalMax);

              row.style.display = visible ? "" : "none";
            });
          };

          [search, status, fromDate, toDate, minTotal, maxTotal].forEach((item) => {
            item.addEventListener("input", filterRows);
            item.addEventListener("change", filterRows);
          });
        })();
      </script>
    </div>
  </body>
</html>
