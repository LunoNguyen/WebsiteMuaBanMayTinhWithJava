<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{shared/_LayoutAdmin :: layout(~{::div.container-fluid})}"
>
  <body>
    <div class="container-fluid px-4">
      <h1 class="mt-4">Quản lý Đơn hàng</h1>
      <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item">
          <a th:href="@{/admin/trang-admin}">Tổng quan</a>
        </li>
        <li class="breadcrumb-item active">Quản lý Đơn hàng</li>
      </ol>

      <div class="card mb-4 shadow-sm">
        <div class="card-header fw-bold">Danh sách Đơn hàng</div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-striped table-bordered align-middle">
              <thead class="table-dark text-center">
                <tr>
                  <th>Mã ĐH</th>
                  <th>Khách hàng</th>
                  <th>Ngày lập</th>
                  <th class="text-end">Tổng tiền</th>
                  <th style="min-width: 280px">Trạng thái & Cập nhật</th>
                  <th>Chi tiết</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="item : ${listDH}">
                  <td class="fw-bold text-center">
                    <a
                      th:href="@{/admin/chitiet-donhang/{id}(id=${item.maHD})}"
                      class="text-decoration-none"
                      th:text="${item.maHD}"
                    ></a>
                  </td>
                  <td
                    th:text="${item.khachHang != null ? item.khachHang.tenKH : 'Khách vãng lai'}"
                  ></td>
                  <td
                    class="text-center"
                    th:text="${#temporals.format(item.ngayLap, 'dd/MM/yyyy')}"
                  ></td>
                  <td
                    class="text-end fw-bold text-success"
                    th:text="${#numbers.formatDecimal(item.tongTienHD, 0, 'COMMA', 0, 'POINT')} + ' đ'"
                  ></td>

                  <td class="text-center">
                    <th:block
                      th:if="${item.trangThaiTT == 'Đã hủy' or item.trangThaiTT == 'Đã thanh toán'}"
                    >
                      <span
                        th:class="'badge fs-6 ' + (${item.trangThaiTT == 'Đã hủy'} ? 'bg-danger' : 'bg-success')"
                        th:text="${item.trangThaiTT}"
                      ></span>
                    </th:block>

                    <th:block
                      th:unless="${item.trangThaiTT == 'Đã hủy' or item.trangThaiTT == 'Đã thanh toán'}"
                    >
                      <form
                        th:action="@{/admin/capnhat-trangthai}"
                        method="post"
                        class="d-flex justify-content-center"
                      >
                        <input
                          type="hidden"
                          name="maDonHang"
                          th:value="${item.maHD}"
                        />
                        <div class="input-group input-group-sm">
                          <select
                            name="newStatus"
                            class="form-select fw-bold"
                            style="width: 140px"
                          >
                            <option
                              th:each="st : ${ {'Đã đặt', 'Đang giao', 'Đã thanh toán', 'Đã hủy'} }"
                              th:value="${st}"
                              th:text="${st}"
                              th:selected="${item.trangThaiTT == st}"
                            ></option>
                          </select>
                          <button
                            type="submit"
                            class="btn btn-warning text-dark fw-bold"
                            title="Lưu trạng thái mới"
                          >
                            Lưu
                          </button>
                        </div>
                      </form>
                    </th:block>
                  </td>

                  <td class="text-center">
                    <a
                      th:href="@{/admin/chitiet-donhang/{id}(id=${item.maHD})}"
                      class="btn btn-info btn-sm text-white"
                      >Xem</a
                    >
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
