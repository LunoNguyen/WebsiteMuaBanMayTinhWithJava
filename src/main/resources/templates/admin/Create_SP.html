<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{shared/_LayoutAdmin :: layout(~{::div.container-fluid})}"
>
  <body>
    <div class="container-fluid px-4 mt-4">
      <h2 class="mb-4 fw-bold text-primary">THÊM SẢN PHẨM</h2>

      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <form
            th:action="@{/admin/create-sp}"
            method="post"
            enctype="multipart/form-data"
          >
            <div class="row mb-3">
              <label class="col-md-2 col-form-label fw-bold">
                Tên sản phẩm
              </label>
              <div class="col-md-10">
                <input
                  type="text"
                  name="tenSP"
                  class="form-control"
                  placeholder="Nhập tên sản phẩm"
                  required
                />
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-md-2 col-form-label fw-bold">
                Nhà cung cấp
              </label>
              <div class="col-md-4">
                <select name="maNCC" class="form-select" required>
                  <option value="">-- Chọn nhà cung cấp --</option>
                  <option
                    th:each="ncc : ${dsNCC}"
                    th:value="${ncc.maNCC}"
                    th:text="${ncc.tenNCC}"
                  ></option>
                </select>
              </div>

              <label class="col-md-2 col-form-label fw-bold text-end">
                Loại sản phẩm
              </label>
              <div class="col-md-4">
                <select name="maLoai" class="form-select" required>
                  <option value="">-- Chọn loại sản phẩm --</option>
                  <option
                    th:each="loai : ${dsLoai}"
                    th:value="${loai.maLoai}"
                    th:text="${loai.tenLoai}"
                  ></option>
                </select>
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-md-2 col-form-label fw-bold">
                Nhà sản xuất
              </label>
              <div class="col-md-4">
                <select name="maNSX" class="form-select" required>
                  <option value="">-- Chọn nhà sản xuất --</option>
                  <option
                    th:each="nsx : ${dsNSX}"
                    th:value="${nsx.maNSX}"
                    th:text="${nsx.tenNSX}"
                  ></option>
                </select>
              </div>

              <label class="col-md-2 col-form-label fw-bold text-end">
                Đơn vị tính
              </label>
              <div class="col-md-4">
                <input
                  type="text"
                  name="donVT"
                  class="form-control"
                  value="Cái"
                  required
                />
              </div>
            </div>

            <div class="row mb-3">
              <label class="col-md-2 col-form-label fw-bold">
                Số lượng tồn
              </label>
              <div class="col-md-4">
                <input
                  type="number"
                  name="soLuongTon"
                  class="form-control"
                  value="1"
                  min="0"
                  required
                />
              </div>

              <label class="col-md-2 col-form-label fw-bold text-end">
                Đơn giá
              </label>
              <div class="col-md-4">
                <input
                  type="number"
                  name="donGiaSP"
                  class="form-control"
                  value="0"
                  min="0"
                  step="1000"
                  required
                />
              </div>
            </div>

            <div class="mt-4 mb-3 border-top pt-3">
              <h5 class="fw-bold text-primary mb-3">Mo ta san pham (tuy chon)</h5>

              <div class="row mb-3">
                <label class="col-md-2 col-form-label fw-bold">CPU</label>
                <div class="col-md-4">
                  <input type="text" name="cpu" class="form-control" placeholder="VD: Intel Core i7" />
                </div>

                <label class="col-md-2 col-form-label fw-bold text-end">RAM</label>
                <div class="col-md-4">
                  <input type="text" name="ram" class="form-control" placeholder="VD: 16GB DDR5" />
                </div>
              </div>

              <div class="row mb-3">
                <label class="col-md-2 col-form-label fw-bold">ROM</label>
                <div class="col-md-4">
                  <input type="text" name="rom" class="form-control" placeholder="VD: 512GB SSD" />
                </div>

                <label class="col-md-2 col-form-label fw-bold text-end">Man hinh</label>
                <div class="col-md-4">
                  <input type="text" name="manHinh" class="form-control" placeholder="VD: 14 inch OLED" />
                </div>
              </div>

              <div class="row mb-3">
                <label class="col-md-2 col-form-label fw-bold">VGA</label>
                <div class="col-md-4">
                  <input type="text" name="vga" class="form-control" placeholder="VD: RTX 4050" />
                </div>

                <label class="col-md-2 col-form-label fw-bold text-end">Khac</label>
                <div class="col-md-4">
                  <input type="text" name="khac" class="form-control" placeholder="VD: Pin 4 cell, vo nhom" />
                </div>
              </div>
            </div>

            <div class="row mb-4">
              <label class="col-md-2 col-form-label fw-bold">
                Ảnh sản phẩm
              </label>
              <div class="col-md-10">
                <input
                  type="file"
                  name="fileAnhs"
                  accept="image/*"
                  class="form-control"
                  multiple
                />
                <small class="text-muted">
                  Có thể chọn nhiều ảnh. Ảnh đầu tiên sẽ được dùng làm ảnh đại diện sản phẩm.
                </small>
              </div>
            </div>

            <div class="mt-4 border-top pt-3">
              <button type="submit" class="btn btn-primary px-4">
                <i class="fas fa-plus"></i> Thêm mới
              </button>

              <a th:href="@{/admin/ql-sanpham}" class="btn btn-secondary ms-2">
                Hủy
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
