<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{shared/_LayoutAdmin :: layout(~{::div.container-fluid})}"
>
  <body>
    <div class="container-fluid px-4">
      <h1 class="mt-4">Quản lý Tài khoản</h1>
      <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item">
          <a th:href="@{/admin/trang-admin}">Tổng quan</a>
        </li>
        <li class="breadcrumb-item active">Quản lý Tài khoản</li>
      </ol>

      <div class="card mb-4 shadow-sm">
        <div
          class="card-header d-flex justify-content-between align-items-center"
        >
          <span class="fw-bold">Danh sách tài khoản</span>
          <a th:href="@{/admin/tao-tk}" class="btn btn-success btn-sm"
            >Thêm tài khoản NV</a
          >
        </div>
        <div class="card-body">
          <div class="row g-2 mb-3">
            <div class="col-md-8">
              <input
                type="search"
                id="tkSearch"
                class="form-control"
                placeholder="Tim theo tai khoan, ma NV, ma KH, email"
              />
            </div>
            <div class="col-md-4">
              <select id="tkRole" class="form-select">
                <option value="">Tat ca phan quyen</option>
                <option value="Admin">Quan tri</option>
                <option value="NhanVien">Nhan vien</option>
                <option value="KhachHang">Khach hang</option>
              </select>
            </div>
          </div>
          <div class="table-responsive">
            <table
              class="table table-bordered table-striped table-hover align-middle"
            >
              <thead class="table-dark text-center">
                <tr>
                  <th>Tài khoản (ID)</th>
                  <th>Mã NV</th>
                  <th>Mã KH</th>
                  <th>Email</th>
                  <th>Phân quyền</th>
                  <th style="min-width: 250px">Hành động</th>
                </tr>
              </thead>
              <tbody id="tkTableBody">
                <tr
                  th:each="item : ${QLTK}"
                  th:data-search="${item.maTK + ' ' + item.maNV + ' ' + item.maKH + ' ' + item.emailTK}"
                  th:data-role="${item.loaiTaiKhoan}"
                >
                  <td class="fw-bold text-primary" th:text="${item.maTK}"></td>
                  <td
                    class="text-center"
                    th:text="${item.maNV != null ? item.maNV : '-'}"
                  ></td>
                  <td
                    class="text-center"
                    th:text="${item.maKH != null ? item.maKH : '-'}"
                  ></td>
                  <td th:text="${item.emailTK}"></td>
                  <td class="text-center">
                    <span
                      th:if="${item.loaiTaiKhoan == 'Admin'}"
                      class="badge bg-danger"
                      >Quản trị</span
                    >
                    <span
                      th:if="${item.loaiTaiKhoan == 'NhanVien'}"
                      class="badge bg-primary"
                      >Nhân viên</span
                    >
                    <span
                      th:if="${item.loaiTaiKhoan == 'KhachHang'}"
                      class="badge bg-success"
                      >Khách hàng</span
                    >
                  </td>
                  <td class="text-center">
                    <div
                      class="d-flex justify-content-center align-items-center gap-1"
                    >
                      <a
                        th:href="@{/admin/sua-taikhoan/{id}(id=${item.maTK})}"
                        class="btn btn-primary btn-sm ms-1"
                        title="Sửa tài khoản"
                        >Sửa</a
                      >

                      <th:block th:if="${item.maTK != session.UserID}">
                        <form
                          th:action="@{/admin/xoa-taikhoan/{id}(id=${item.maTK})}"
                          method="post"
                          class="d-inline"
                        >
                          <button
                            type="submit"
                            class="btn btn-danger btn-sm ms-1"
                            title="Xóa tài khoản"
                            onclick="
                              return confirm(
                                'Bạn có chắc chắn muốn xóa tài khoản này? Hành động này không thể hoàn tác.',
                              );
                            "
                          >
                            Xóa
                          </button>
                        </form>
                      </th:block>
                      <th:block th:unless="${item.maTK != session.UserID}">
                        <span class="badge bg-secondary ms-1">Tôi</span>
                      </th:block>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <script>
        (() => {
          const search = document.getElementById("tkSearch");
          const role = document.getElementById("tkRole");
          const rows = Array.from(document.querySelectorAll("#tkTableBody tr"));

          const normalize = (value) => (value || "").toString().toLowerCase();
          const filterRows = () => {
            const keyword = normalize(search.value);
            const selectedRole = role.value;

            rows.forEach((row) => {
              const visible =
                normalize(row.dataset.search).includes(keyword) &&
                (!selectedRole || row.dataset.role === selectedRole);

              row.style.display = visible ? "" : "none";
            });
          };

          search.addEventListener("input", filterRows);
          role.addEventListener("change", filterRows);
        })();
      </script>
    </div>
  </body>
</html>
