<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{shared/_LayoutAdmin :: layout(~{::div.container-fluid})}"
>
  <body>
    <div class="container-fluid px-4">
      <h1 class="mt-4">Quản lý Nhân Viên</h1>
      <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item">
          <a th:href="@{/admin/trang-admin}">Tổng quan</a>
        </li>
        <li class="breadcrumb-item active">Danh sách Nhân Viên</li>
      </ol>

      <div class="card mb-4 shadow-sm">
        <div
          class="card-header d-flex justify-content-between align-items-center"
        >
          <span class="fw-bold">Danh sách nhân viên</span>
          <a th:href="@{/admin/create-nv}" class="btn btn-primary btn-sm"
            >Thêm mới</a
          >
        </div>
        <div class="card-body">
          <div class="row g-2 mb-3">
            <div class="col-md-8">
              <input
                type="search"
                id="nvSearch"
                class="form-control"
                placeholder="Tim theo ma NV, ten, email, so dien thoai, dia chi"
              />
            </div>
            <div class="col-md-4">
              <input
                type="search"
                id="nvRole"
                class="form-control"
                placeholder="Loc theo ma chuc vu"
              />
            </div>
          </div>
          <div class="table-responsive">
            <table
              class="table table-bordered table-striped table-hover align-middle"
            >
              <thead class="table-dark text-center">
                <tr>
                  <th>Mã NV</th>
                  <th>Mã CV</th>
                  <th>Họ và Tên</th>
                  <th>Email</th>
                  <th>Số điện thoại</th>
                  <th>Địa chỉ</th>
                  <th style="width: 150px">Hành động</th>
                </tr>
              </thead>
              <tbody id="nvTableBody">
                <tr
                  th:each="item : ${QLNV}"
                  th:if="${!QLNV.isEmpty()}"
                  th:data-search="${item.maNV + ' ' + item.maCV + ' ' + item.tenNV + ' ' + item.emailNV + ' ' + item.sdtNV + ' ' + item.diaChiNV}"
                  th:data-role="${item.maCV}"
                >
                  <td class="text-center" th:text="${item.maNV}"></td>
                  <td class="text-center" th:text="${item.maCV}"></td>
                  <td class="fw-bold" th:text="${item.tenNV}"></td>
                  <td th:text="${item.emailNV}"></td>
                  <td th:text="${item.sdtNV}"></td>
                  <td th:text="${item.diaChiNV}"></td>
                  <td class="text-center">
                    <div class="d-flex justify-content-center gap-1">
                      <a
                        th:href="@{'/admin/edit-nv/' + ${item.maNV}}"
                        class="btn btn-warning btn-sm text-dark fw-semibold"
                        >Sửa</a
                      >
                      <form
                        th:action="@{'/admin/xoa-nhanvien/' + ${item.maNV}}"
                        method="post"
                        onsubmit="return confirm('Bạn có chắc chắn muốn xóa?');"
                      >
                        <button
                          type="submit"
                          class="btn btn-danger btn-sm fw-semibold"
                        >
                          Xóa
                        </button>
                      </form>
                    </div>
                  </td>
                </tr>

                <tr th:if="${QLNV == null or QLNV.isEmpty()}">
                  <td colspan="7" class="text-center text-muted py-5">
                    <h5 class="fw-bold mt-2">Chưa có dữ liệu</h5>
                    <p>Hiện chưa có nhân viên nào trong hệ thống.</p>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <script>
        (() => {
          const search = document.getElementById("nvSearch");
          const role = document.getElementById("nvRole");
          const rows = Array.from(document.querySelectorAll("#nvTableBody tr[data-search]"));

          const normalize = (value) => (value || "").toString().toLowerCase();
          const filterRows = () => {
            const keyword = normalize(search.value);
            const roleKeyword = normalize(role.value);

            rows.forEach((row) => {
              const rowText = normalize(row.dataset.search);
              const rowRole = normalize(row.dataset.role);
              row.style.display =
                rowText.includes(keyword) && rowRole.includes(roleKeyword)
                  ? ""
                  : "none";
            });
          };

          search.addEventListener("input", filterRows);
          role.addEventListener("input", filterRows);
        })();
      </script>
    </div>
  </body>
</html>
